canonical_identifier: bkk:krp/KR3ee021/jc/v1/juan/1
seq: 1
front:
  text: 序醫書最古而可信者莫如素難於針灸之訣又獨詳焉蓋原人之經絡血脈陰陽表裡以起百病之本而針石湯火各有所宜施其齊之得也雖磁石取針何足云喻然每患於注述乖刺拙者用之往往失理鮮不以愈為劇可不慎耶四明梅孤子高武纂集針灸要旨及聚英共三帙一切以素難為主而於後世之專門名家多附述焉其用意勤甚少參東石戴公既親為校正且委諸鉛令未齊陶君師文梓而行之是將廣其傳於世欲人知所師而用之庶乎其不繆也仁者之政類如此矣陶君屬豫言為之序豫因題數語於簡端俾世之知此書之傳實自二公始而醫之果不繆也則高子之功何可少哉謹序嘉靖丁酉仲夏九日弋陽黃易書於九潭精舍
  hash: sha256:70962fb8a80c9fc7571e073f3f43ba2c21a7968ff75111a89f5698d3bf62775b
  markers:
  - {type: 'tls:head', offset: 0, content: '', id: KR3ee021_jc_000-d2.h1s1}
body:
  text: 凡例一難經節要先取行針補瀉次取井滎俞經合又次及經脈各以類相從不拘舊經篇次一素問節要先九針次補瀉次諸法次病刺次經脈髎冗不拘舊文篇目一難經注雖多惟滑氏本義折衷衆說故存之一各書有羽翼難經者集注於各條下一難經注與經旨未合者竊疑之非敢妄議前人也亦欲求明夫理耳一素問內經靈樞舊有王冰注議者謂其多所強解今去之惟録其本文一素問浩瀚今節要立題分類以便記誦一前人謂素問篇次失序錯簡不無今節要或録其全篇或摘其一節而類聚之書之有圖所以彰明其義也可圖則圖之今置圖卷首以備參考九針式平半寸長一寸六分其頭大末鋭其病熱在頭身宜此其身員鋒如卵形長一寸六分肉分氣滿宜此鋒如黍粟之鋭長三寸五分脈氣虛少宜此刃三隅長一寸六分瀉熱出血發泄痼病宜此一名鈹針末如劍鋒廣二寸半長四寸破癰腫出膿血尖如毫且員且利中身微大長一寸六分調陰陽去暴痹法象毫尖如蚊虻喙長三寸六分調經絡去疾病鋒如利長七寸痹深居骨解腰脊節奏之間者一名焠針長四寸風虛合於骨解皮膚之間者
  hash: sha256:814ba42d1cc77480e3d5fb802ae8931df37384573563510df102a212d2f7b16d
