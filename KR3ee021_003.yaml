body:
  text: 卷二上靈素一用針方宜帝曰醫之治病也一病而治各不同何也岐伯曰地氣使然也故東方之域天地之所始生也魚鹽之地海濱傍水其民食魚而嗜鹼皆安其處美其食魚者使人熱中鹽者勝血故其民黑色理疏其病皆為癰瘍音羊其治宜砭石故砭石者亦從東方來南方者天地所長養之盛處也其地下水土弱霧露之所聚也其民嗜酸而食胕其民皆致理而赤色其病攣痹其治宜微針故九針亦從南方來形樂志苦病生於內治之以針石二九針式帝曰針之長短有數乎岐伯對曰一曰鑱針取法巾針頭大末鋭去末寸半卒鋭之長一寸六分二曰員針取法於絮針筒音同其身而卵其鋒針如卵形員其末長一寸六分三曰匙音低針取法於黍粟之鋭長三寸半四曰鋒針取法於絮針筒其身鋒其末刃三隅長一寸六分五曰鈹音彼針取法於劍鋒末如劍廣二寸半長四寸六曰員利針取法於犛針大如犛且員且鋭微大其末反小其身又曰中身微大長一寸六分七曰毫針取法於毫毛尖如蚊虻喙長一寸六分八曰長針取法於綦針鋒利身薄長七寸九曰大針取法於鋒針尖如挺其鋒微員針形畢矣此九針之長短也三九針應天地人時以起用岐伯曰夫聖人之起天之數也一而九之故以主九野九而九之九九八十一以起黃鐘數焉以針應數也帝曰以針應九數奈何岐伯曰一者天也天者陽也五臟之應天者肺肺者五臟六腑之蓋也皮者肺之合也人之陽也故為之治針必大其頭而鋭其末令無得深入而陽氣出二者地也人之所以應土者肉也故為之治針必筒其身而員其末令毋得傷肉分傷則氣得竭三者人也人之所以成生者血脈也故為之治針必大其身而員其末令可以按末勿陷以致其氣令邪氣獨出四者時也時者四時八風之客於經絡之中為瘤病也故為之治針必筒其身而鋭其末令可以瀉熱出血而痼病竭五者音也音者冬夏之分分於子行陰與陽別寒與熱爭兩氣相搏合為癰膿者也故為之治針必令其末如劍鋒可以取大膿六者律也律者調陰陽四時而合十二經脈虛邪客於經絡而為暴痹者也故為之治針必令尖如犛且員且鋭中身微大以取暴氣七者星也星者人之七竅邪之所客經絡而為痛痹舍於經絡者也故為之治針令尖如蚊虻喙靜以徐往微以久留正氣因之真邪俱往出針而養者也八者風也風者人之股肱八節也八正之虛風八風傷人內舍於骨解腰脊節腠理之間為深痹也故為之治針必長其身鋒其末可以深取遠痹九者野也野者人之節解皮膚之間也淫邪流溢於身如風水之狀而溜不能通於機關大節者也故為之治針大如挺其鋒微員以取大氣之不能過於關節者也一天二地三人四時五音六律七星八風九野身形亦應之針有所宜故曰九針人皮應天人肉應地人脈應人人筋應時人聲應音人陰陽合氣應律人齒面目應星人出入氣應風人九竅三百六十五絡應野故一針皮二針肉三針脈四針筋五針骨六針調陰陽七針應精八針除風九針通九竅除三百六十五節氣此之謂有所主也四九針所宜九針之宜各有所為長短大小各有所施刺熱者用鑱針刺寒者用毫針刺大者用鋒針刺小者用員利針刺癰者用鈹針鑱針出瀉陽氣員針者揩摩分肉間不得傷肌肉以瀉分氣匙針者主按脈勿陷以致其氣令邪氣勿陷鋒針者以發痼疾鈹針者以取大膿員利針者以取暴氣毫針者靜以徐往微以久留而癢以取痛痹長針者可以取遠痹大針者以瀉機關之水病在皮膚取以鑱針於病所膚白勿取病在分肉間取以員利針於病所病在脈氣少當補之者取之匙針於井滎分輸病為大膿者取以鈹針病痹氣暴發者取以員利針病痹氣痛而不去者取以毫針病在中者取以長針水腫不能過關節者取以大針以小治小者其功小以大治大者多害故其以成膿血者其惟砭石鈹針之所取也五五刺應五臟凡刺有五以應五臟一曰半刺半刺者淺內而疾髮針無針傷肉如拔毛狀以取皮氣此肺之應也二曰豹文刺豹文刺者左右前後針之中脈為故以取經絡之血者此心之應也三曰關刺關刺者直刺左右盡筋上以取筋痹慎無出血此肝之應也或曰淵刺一曰豈刺四曰合谷刺合谷刺者左右雞足針於分肉之間以取肌痹此脾之應也五曰輸刺輸刺者直入直出深內之至骨以取骨痹此腎之應也六九刺應九變凡刺有九以應九變一曰輸刺輸刺者刺諸經榮俞藏俞也二曰遠道刺遠道刺者病在上取之下刺府輸也三曰經刺經刺者刺大經之結絡經分也四曰絡刺絡刺者刺小絡之血脈也五曰分刺分刺者刺分肉之間也六曰大瀉刺大瀉刺者刺大膿以鈹針也七曰毛刺毛刺者刺浮皮毛也八曰巨刺巨刺者左取右右取左九曰焠刺焠刺者燔刺以取痹也七十二刺應十二經凡刺有十二節以應十二經一曰偶刺偶刺者以手直心若背直痛所一刺前一刺後以治心痹刺此者傍針之也二曰報刺報刺者刺痛無常處也上下行者直內無拔針以左手隨病所按之乃出針復刺之也三曰恢刺恢刺者直刺傍之舉之前後恢筋急以治筋痹四曰齊刺齊刺者直入一旁入二以治寒氣小深者或曰三刺三刺者以治痹氣小深者也五曰楊刺楊刺者正內一傍內四而浮之以治寒氣大博大者也六曰直針刺直針刺者引皮乃刺之以治寒氣之淺者也七曰輸刺輸刺者直入直出稀髮針而深之以治氣盛而熱者也八曰短刺短刺者刺骨痹稍搖而深之置針骨所以上下摩骨也九曰浮刺浮刺者傍入而浮之以治肌急而寒者也十曰陰刺陰刺者左右率刺之以治寒厥中寒厥足踝後少陰也十一曰傍針刺傍針刺者直刺傍刺各一以治留痹久居者也十二曰贊刺贊刺者直入直出數髮針而淺之出血是謂治癰腫也八黑白肥瘦刺帝曰願聞人之黑白肥瘦小長各有數乎岐伯曰年質壯大血氣充盈膚革堅固因加以邪刺此者深而留之此肥人也廣肩腋項肉薄厚皮而黑色唇臨臨然其血黑以濁其氣澀以遲其為人也貪於取興刺此者深而留之多益其數也瘦人皮薄色少肉廉廉然薄唇輕言其血氣清易脫於氣易損於血刺此者淺而疾之刺肥人者以秋冬之齊刺瘦人者以春夏之齊九刺常人曰刺常人奈何視其白黑各為調之其端正敦厚者其血氣和調刺此者無失常數也十刺王公大人布衣帝曰夫王公大人血氣之君身體柔脆肌肉軟弱血氣慓悍滑利其刺之淺深疾徐多少何如岐伯曰膏粱藿菽之味何可同也氣滑即疾出其氣澀則出遲氣悍則針小而入淺氣澀則針大而入深深則欲留淺則欲疾以此觀之刺布衣者深而留之刺大人者微以徐之此皆因其慓悍滑利也寒痹內熱刺布衣以火焠之刺大人以藥尉之十一刺壯士帝曰刺壯士真骨者奈何岐伯曰刺壯士真骨堅肉緩節監監然此人重則氣澀血濁刺此者深而留之多益其數徑則氣滑血清刺此者淺而疾之十二刺嬰兒曰刺嬰兒奈何曰嬰兒者其肉脆血少氣弱刺此者以毫針淺刺而疾髮針日再可也十三刺脈虛實淺深脈實者深刺之以泄真氣脈虛淺刺之使精氣無得出以養其脈獨出其邪氣刺陰者深而留之刺陽者淺而疾之脈淺者勿刺按其脈乃刺之無令精出獨出其邪氣耳脈之所居深不見者勿按其脈而刺之微內針而久留之以致其孔脈氣也十四十二經氣血刺夫人之常數太陽常多血少氣少陽常少血多氣陽明常多氣多血少陰常少血多氣厥陰常多血少氣太陰常多氣少血此天之常數陽明多血多氣刺陽明出血氣太陽多血少氣刺太陽出血惡氣少陽多氣少血刺少陽出氣惡血太陰多血少氣刺太陰出血惡氣厥陰多血少氣刺厥陰出血惡氣少陰多氣少血刺少陰出氣惡血也十五手足陰陽經脈刺足陽明五臟六腑之海也其脈大血多氣盛壯熱刺此者不深弗散不留不瀉也足陽明刺深六分留十呼足太陽深五分留七呼足少陽深四分留五呼足少陰深三分留四呼足太陰深二分留三呼足厥陰深一分留二呼手之陰陽其受氣之道近其氣之來疾其刺深者皆無過二分其留皆無過一呼刺而過此者則脫氣十六補瀉帝曰余聞刺法有餘瀉之不足補之岐伯曰百病之生皆有虛實而補瀉行焉瀉虛補實神去其室致邪失正真不可定粗之所敗謂之夭命補虛瀉實神歸其室久塞其空謂之良工凡用針者隨而瀉之迎而道之虛則實之滿則瀉之菀陳則除之邪勝則虛之徐而疾則實疾而徐則虛言實與虛若有若無察後與先若存若亡為虛與實若得若失虛實之要九針最妙補瀉之時以針為之瀉曰必持內之放而出之排陽得針邪氣得泄按而引針是謂內溫血不得散氣不得出也補曰隨之隨之之意若妄之若行若按如蚊虻止如留如遠去如弦絶令左屬右其氣故止外門已閉中氣乃實必無留血必取誅之刺之而氣不至無問其數刺之而氣至乃去之勿復針針有懸布天下者五點首共餘食莫之知也一曰治神二曰知養身三曰知毒藥四曰制砭石大小五曰知五臟血氣之診五法俱立各有所先今末世之刺也虛者實也滿者泄之此皆衆工所共知也若夫法天則地隨應而動和之者若響隨之者若影道無鬼神獨來獨往帝曰願聞其道岐伯曰凡刺之真必先治神五臟已定九候已備後乃存針衆脈不見衆凶弗聞外內相得無以形先可玩往來乃施於人人有虛實五虛勿近五實勿遠至其當發間不容瞚手動若務針耀而勻靜意視義觀適之變是謂冥冥莫知其形見其烏烏見其稷稷從見其飛不知其誰伏如橫努起如發機刺虛者須其實刺實者須其虛經氣已至慎守勿失深淺在志遠近若一如臨深淵手如握虎神無營於衆物義無邪下必正其神小針之要易陳而難入粗守形上守神神乎神客在門未睹其疾惡知其原刺之微在速遲粗守關上守機機之動不離其空空中之機清淨而微其來不可逢其往不可追知機之道者不可挂以發不知機道叩之不發知其往來要與之期粗之暗呼妙哉工獨有之往者為逆來者為順明知逆順正行無間迎而奪之惡得無虛追而濟之惡得無實迎之隨之以意和之針道畢矣凡用針者虛則實之滿則泄之菀陳則除之邪勝則虛之大要曰徐而疾則實疾而徐則虛言實與虛若有若無察後與先若存若亡為虛與實若得若失虛實之要九針最妙補瀉之時以針為之瀉曰必持內之放而出之排陽得針邪氣得泄按而引針是為內溫血不得散氣不得出也補曰隨之隨之意若妄之若行若按如蚊虻止如留如遠去如弦絶令左屬右其氣故止外門已閉中氣乃實必無留血急取誅之持針之道堅者為寶正指直刺無針左右神在秋毫屬意病者審視血脈者刺之無殆方刺之時必在懸陽及與兩衛神屬勿去知病存亡血脈者在腧橫居視之獨澄切之獨堅刺虛則實之針下熱也氣實乃熱也滿而泄之者針下寒也菀陳則除之者出惡血也邪盛則虛之者出針勿按徐而疾則實者徐出針而疾按之疾而徐則虛者疾出針而徐按之言實與虛者寒溫氣多少也若無若有者疾不可知也察後與先者知病先後也為虛與實者工勿失其法若得若失者離其法也虛實之要九針最妙者為其各有所宜也補瀉之時者與氣開闔相合也九針之名各不同形者針窮其所當補瀉也刺實須與虛者留針陰氣隆至乃去針也刺虛須與實者陽氣隆至針下熱乃去針也經氣已至慎守勿失者勿變更也淺深在志者知病之內外也近遠如一者深淺其候等也如臨深淵者不敢墜也手如握虎者欲其壯也神無營於衆物者靜志觀病人無左右視也義無邪下者欲端以正也必正其神者欲瞻病人目制其神令氣易行也所謂易陳者易言也難入者難著於人也粗守形者守刺法也上守神者守人之血氣有餘不足可補瀉也神客者正邪共會也神者正氣也客者邪氣也在門者邪循正氣之所出入也未觀其疾者先知邪正何經之疾也惡知其原者先知何經之病所取之處也刺之微在數遲者徐疾之意也粗守關者守四肢而不知血氣正邪之往來也上守機者知守氣也機之動不離其空者知氣之虛實用針之徐疾也空中之極清淨以微者針以得氣密意守氣勿失也其來不可逢者氣盛不可補也其往不可追者氣虛不可瀉也不可挂以發者言氣易失也扣之不發者言不知補瀉之意也血氣已盡而氣不下也知其往來者知氣之逆順盛虛也要與之期者知氣之可取之時也粗之暗者冥冥不知氣之微密也妙哉工獨有之者盡知針意也往者為逆者言氣之虛而小小者逆也來者為順者言氣之平平者順也明知逆順正行無問者言知所取之處也逆而奪之者瀉也追而濟之者補也所謂虛則實之者氣口虛而當補之也滿則泄之者氣口盛而當瀉之也苑陳則除之者去血脈也邪勝則虛之者言諸經有盛者皆瀉其邪也徐而疾則實者言徐內而疾出也疾而徐則虛者言疾內而徐出也言實與虛若有若無者言實者有氣虛者無氣也察後與先若無若存者言氣之虛實補瀉之先後也察其氣之已下與常存也為虛與實若得若失者言補者必然若有得也瀉則恍然若有失也是故工之用針也知氣之所在而守其門戶明於調氣補瀉所在徐疾之意所取之處瀉必用員切而轉之其氣乃行疾而徐出邪氣乃出伸而逆之搖大其穴氣出乃疾補必用方外引其皮令當其門左引其樞右推其膚微旋而徐推之必端以正安以靜堅心無解欲微以留氣下而疾出之推其皮蓋其外門神氣乃存用針之要無忘其神瀉必用方者以氣方盛也以月方滿也以日方溫也以身方定也以息方吸而納針及復候其方吸而轉針乃復候其方呼而徐引針故曰瀉補必用員者員者行也行者移也刺必中其榮復以吸排針也故員與方非針也瀉實者氣盛乃內針針與氣俱內以開其門如利其戶針與氣俱出精氣不傷邪氣乃下外門不閉以出其實搖大其道如利其路是謂大瀉必切而出大氣乃屈持針叩置以定其宜候呼內針氣出針入針空四塞精無從出方實而疾出針氣入針出熱不得遠閉塞其門邪氣布散精氣乃得存動氣候時近氣不失遠氣乃來是謂追之吸則內針無令氣忤靜以久留無令邪布吸則轉針以得氣為故候呼引針呼盡乃出大氣皆出故命曰瀉捫而循之切而散之推而按之彈而怒之爪而下之通而取之外引其門以閉其神呼盡內針靜以久留以氣至為故如待所貴不知日暮其氣以至適而自護候吸引針氣不得出各在所處推闔其門令神氣存大氣留止故命曰補補瀉弗失與天地一經氣已至慎守勿失淺深在志遠近如一如臨深淵手如握虎神無營於衆物持針之道欲端以正安以靜先知虛實而行疾徐左手執針右手循之無與肉果瀉欲端以正補必閉膚轉針導氣邪得淫失真氣得居帝曰捍皮開腠理奈何岐伯曰因其分肉左別其膚微內而徐端之適神不散邪氣得去知其氣所在先得其道稀而疏之稍深以留故能徐入之大熱在上推而下之上者引而去之視先痛者常先取之大寒在外留而補之入於中者從合瀉之上氣不足推而揚之下氣不足積而從之寒入於中推而行之夫實者氣入也虛者氣出也氣實者熱也氣虛者寒也入實者左手開針孔也入虛者右手閉針孔也形氣不足病氣有餘是邪勝也急瀉之形氣有餘病氣不足急補之形氣不足病氣不足此陰陽俱不足也不可刺刺之則重不足重不足則陰陽俱竭血氣皆盡五臟空虛筋骨髓枯老者絶滅壯者不復矣形氣有餘病氣有餘此謂陰陽俱有餘也急瀉其邪調其虛實故曰有餘者瀉之不足者補之此之謂也故曰刺不知逆順真邪相搏滿而補之則陰陽四溢腸胃充郭肝肺內䐜陰陽相錯虛而瀉之則經脈空虛血氣竭枯腸胃㒤闢皮膚薄著毛腠夭焦豫之死期凡用針之類在於調氣氣積於胃以通榮衛各行其道宗氣留於海其下者經於氣衝其直者走於息道故厥在於足宗氣不下脈中之血流而不止弗之火調弗能取之散氣可收聚氣可布深居靜處占神往來閉戶塞牘魂魄不散專意一神精氣之分毋聞人聲以收其精必一其神令志在針淺而留之微而浮之以移其神氣至乃休男內女外堅拒勿出謹守勿內是謂得氣刺之而氣不至無問其數刺之而氣至乃去之勿復針針各有所宜各不同形各任其所為刺之要氣至而有效效之信若風之吹雲明乎若見蒼天刺之道畢矣用針者必先察其經絡之虛實切而循之按而彈之視其應動者乃後取之而下之六經調者謂之不病雖病謂之自已一經上實下虛而不通者此必有橫絡盛加於大經令之不通視而瀉之此所謂解結也上寒下熱先刺其項太陽久留之已刺則尉項與肩胛令熱下合乃止此所謂推而上之者也上熱下寒視其脈虛而陷下於經者取之氣下乃止此所謂引而下之者也大熱篇身狂而妄見妄聞妄語視足陽明及大絡取之虛者補之血而實者瀉之因其偃臥居其頭前以兩手四指挾按頭動脈久持之卷而切推下至缺盆中而復止如前熱去乃止此所謂推而散之者也帝曰余聞刺法言有餘者瀉之不足者補之何謂有餘何謂不足岐伯曰有餘有五不足亦有五帝欲問帝曰願盡聞之岐伯曰神有餘有不足氣有餘有不足血有餘有不足形有餘有不足志有餘有不足凡此十者其氣不等也帝曰人有精氣津液四支九竅五臟十六部三百六十五節乃生百病百病之生皆有虛實今夫子乃言有餘有五不足亦有五何以生之乎岐伯曰皆生於五臟也夫心藏神肺藏氣肝藏血脾藏肉腎藏志而此成形志意通內連骨髓而成身形五臟五臟之道皆出於經隧以行血氣血氣不和百病乃變化而生是故守經隧焉帝曰神有餘不足何如岐伯曰神有餘則笑不休神不足則悲血氣未並五臟安定邪客於形灑淅起於毫毛未入於經絡也故命曰神之微帝曰補瀉奈何岐伯曰神有餘則瀉其小絡之血出血勿之深斥無中其大經神氣乃平神不足視其虛絡按而致之刺而利之無出其血無泄其氣以通其經神氣乃平帝曰刺微奈何岐伯曰按摩勿釋著針勿斥移氣於不足神氣乃得復帝曰善氣有餘不足奈何氣有餘則喘咳上氣不足則息利少氣血氣不並五臟安定皮膚微病命曰白氣微泄帝曰補瀉奈何岐伯曰氣有餘則瀉其經隧無傷其經無出其血無泄其氣不足則補其經隧無出其氣帝曰刺微奈何岐伯曰按摩勿釋出針視之曰我將深之適人必革精氣自伏邪氣散亂無所休息氣泄腠理真氣乃相得帝曰善血有餘不足奈何岐伯曰血有餘則怒不足則恐血氣未並五臟安定孫絡水溢則經有流血帝曰補瀉奈何岐伯曰血有餘則瀉其盛經出其血不足則視其虛經針其脈中久留而視脈大疾出其針無令血泄帝曰刺留血奈何岐伯曰視其血絡刺出其血無令惡血得入於經以成其疾帝曰善形有餘不足奈何岐伯曰形有餘則腹脹涇溲不利不足則四支不用血氣未並五臟安定肌肉蠕動命曰微風帝曰補瀉奈何岐伯曰形有餘則瀉其陽經不足則補其陽絡帝曰微刺奈何岐伯曰取分肉間無中其經無傷其絡衛氣得復邪氣乃索帝曰善志有餘不足奈何岐伯曰志有餘則腹脹飧泄不足則厥血氣未並五臟安定骨節有動帝曰補瀉奈何岐伯曰志有餘則瀉然筋血者不足則補其復留帝曰刺未並奈何岐伯曰即取之無中其經邪所乃能立虛血清氣濁疾瀉之則氣竭血濁氣澀疾瀉之則經可通十七刺胸腹刺胸腹者必以布𢅎著之乃從單布上刺刺之不愈復刺十八標本先病而後逆者治其本先逆而後病者治其本先寒而後生病者治其本先病而後生寒者治其本先熱而後生病者治其本先泄而後生他病者治其本必且調之乃治其他病先病而後中滿者治其標先病而後泄者治其本先中滿而後煩心者治其本人有客氣有同氣大小便不利治其標大小便利治其本病發而有餘本而標之先治其本後治其標病發而不足標而本之先治其標後治其本謹詳察間甚以意調之間者並行甚為獨行先大小便不利而後生他病者治其本也十九針灸手明目者可使視色聰耳者可使聽音建辭疾語者可使傳論語徐而安靜手巧而心審諦者可使行針艾理血氣而調諸逆順察陰陽而兼諸方緩節柔筋而心和調者可使導引行氣疾毒言語輕人者可使唾癰呪病爪苦手毒為事善傷者可使按積抑痹各得其能方乃可行其名乃彰不得其人其功不成其師無名故曰得其人乃言非其人弗傳此之謂也手毒者可使按龜置龜於器下而按其上五十日而死矣手甘者復生如故也二十刺宜從時凡刺之法必候日月星辰四時八正之氣氣定乃刺之是故天溫日明則人血淖澤而衛氣浮故血易瀉氣易行天寒日陰則人血凝泣而衛氣沉月始生則血氣始精衛氣始行月郭滿則血氣實肌肉堅月郭空則肌肉減經絡虛衛氣去形獨居是以因天時而調血氣也是以天寒無刺天溫無凝月生無瀉月滿無補月郭空無治是謂得時而調之也因天之時盛虛之時移光定位正時而待之故曰月空而瀉是謂藏虛月滿而補血氣揚波絡有留血命曰重實月郭空而治是謂亂經陰陽相錯真邪不別沉以留止外虛內亂淫邪乃起帝曰星辰八正何候岐伯曰星辰者所以候日月之行也八正者所以候八風虛邪以時至者也四時者所以分春夏秋冬之氣所在以調之也八正之虛邪避之勿犯也是故春氣在經脈夏氣在孫絡長夏氣在肌肉秋氣在皮膚冬氣在骨髓中春者天氣始開地氣始泄凍解冰釋水道經通故人氣在脈夏者經滿氣溢孫絡受血皮膚充實長夏者經絡皆盛內溢肌中秋者天氣始收腠理閉塞皮膚引急冬者蓋藏血氣在中內著骨髓通於五臟是故邪氣者常隨四時之氣血而入客也故用針之服者必有法則上視天光下司八正以避奇邪而觀百姓審於虛實毋犯其邪是得天之露遇歲之虛救而不勝反受其殃故曰必知天忌乃言針意春刺散俞及與分理血出而止甚者傳氣間者環也夏刺絡俞見血而止盡氣閉環痛病必下秋刺皮膚循理上下同法神變而止冬刺俞竅於分理甚者直下間者散下春夏秋冬各有所刺法其所在春者木始治肝氣始生其風病急經脈常深其氣不能深入故取絡脈分肉間夏者火始治心氣始強脈瘦氣弱陽氣溜溢熱董分腠內至於經故取盛經分腠絶膚而病去者邪氣淺也所謂盛經陽脈也秋者金始治肺將收殺金得勝火陽氣在合故陰氣初勝濕氣及體陰氣未盛未能深入故取俞以瀉陰邪取合以虛陽邪陽氣始衰故取於合冬者水始治腎方閉陽氣衰少陰氣堅盛巨陽伏沉陽脈乃去故取井以下陰逆取滎以實陽氣故曰冬取井滎春不鼽衄正月二月三月人氣在左無刺左足之陽四月五月六月人氣在右無刺右足之陽七月八月九月人氣在右無刺右足之陰十月十一月十二月人氣在左無刺左足之陰甲乙日自乘無刺頭無發蒙於耳內丙丁日自乘無振挨於肩喉廉泉戊己日乘四季無刺足去爪瀉水庚申日自乘無刺關骨於股膝壬癸日自乘無刺足脛隨日之長短各以為紀而刺之謹候其時病可與期失時反候者百病不治故曰刺實者刺其來也刺虛者刺其去也此言氣存亡之時以候虛實而刺則之候氣之所在而刺之是謂逢時病在於三陽必候其氣在於陽而刺之病在三陰必候其氣在於陰而刺之二十一五奪不可瀉形肉已脫一奪也大脫血之後是二奪也大汗出之後是三奪也大泄之後是四奪也新産大血之後是五奪也此皆不可瀉二十二刺逆四時春刺夏分脈亂氣微八淫骨髓病不能愈又且少氣春刺秋分筋攣逆氣環為咳嗽病不愈令人時驚又且哭春刺冬分邪氣著藏令人脹病不愈又且欲言語夏刺春分病不愈令人懈惰夏刺秋分病不愈令人欲無言惕惕如人將捕之夏刺冬分病不愈令人少氣時欲怒秋刺春分病不已令人惕然欲有所為起而忘之秋刺夏分病不已令人益嗜臥又且善夢秋刺冬分病不已令人淅淅時寒冬刺春分病不已令人欲臥不能眠眠而有見冬刺夏分病不愈令人上氣發為諸痹冬刺秋分病不已令人善渴春刺絡脈血氣外溢令人少氣春刺肌肉血氣環逆令人上氣春刺筋骨血氣內著令人腹脹夏刺經脈血氣乃竭令人解亦夏刺肌肉血氣內卻令人善悲夏刺筋骨血氣上逆令人善怒秋刺經脈血氣上逆令人善忘秋刺絡脈氣不外行令人臥不欲動秋刺筋骨血氣內散令人寒栗冬刺經脈血氣皆脫令人目不明冬刺絡脈內氣外泄留為大痹冬刺肌肉陽氣竭絶令人善忘凡此四時刺者大逆之病不可不從也反之則生亂氣相淫病焉二十三刺避凡刺胸腹者必避五臟中心者遠死其動為噫中肝者五日死其動為語中脾者十日死其動為吞中腎者六日死其動為嚏中肺者三日死其動為咳中膽者一日半死其動為嘔中鬲者皆為傷中其病雖愈不過一歲必死刺避五藏者知逆從也所謂從者鬲與脾腎之處不知者反之刺跗上中大脈血出不止死刺面上中溜脈不幸為盲刺頭中腦戶入腦立死刺舌下中大脈太過血出不止為喑刺足下布絡中脈血不出為腫刺郤委中穴中大脈令人僕脫色刺氣衝中脈血不出為腫鼠僕刺脊間中髓為傴刺乳上中乳房為腫根蝕刺缺盆中內陷氣泄令人喘咳逆刺手魚腹中陷為腫無刺大醉令人氣亂無刺大怒令人氣逆無刺大勞人無刺新飽人無刺大渴人病有脅下道二二歲不已名曰息積此不妨於食不可灸刺毋損不足者身贏瘦毋用饞石也刺陰股中大脈血出不止死刺客主人內陷中脈為內漏為聾刺膝臏出液為跛刺臂太陰脈出血多立死刺足少陰脈重虛出血為舌難以言刺膺中陷中肺為喘逆仰息刺跗中內陷氣歸之不得屈伸刺陰股下三寸內陷令人遺溺刺腋下脅間內陷令人咳刺小腹中膀胱溺出令人小腹滿刺腨腸內陷為腫刺匡上陷骨中脈為漏為盲刺關節中液出不得屈伸無刺熇熇之熱無刺渾渾之脈無刺灑灑之汗無刺病與脈相逆者窺門而刺之者死於家中入門而刺之者死於堂上新內勿刺已刺勿內已醉勿刺已刺勿醉新怒勿刺已刺勿怒新勞勿刺已刺勿勞已飽勿刺已刺勿飽已飢勿刺已刺勿飢已渴勿刺已刺勿渴乘車來者臥而休之如食頃乃刺之出行來者坐而休之如行十里頃乃刺之大驚大恐必定其氣乃刺之二十四禁太過不及病淺針深內傷良肉皮膚為癰病深針淺病氣不瀉反為大膿病小針大氣泄太甚疾反為害病大針小氣不泄瀉亦復為敗失針之宜大者瀉小者不移病有浮沉刺有淺深各至其理無過其道過之則肉傷不及則生外壅壅則邪從之淺深不得反為大賊內動五臟後生大病故曰病有在毫毛腠理者有在肌肉者有在脈者有在筋者有在骨者有在髓者是故刺毫毛腠理無傷皮皮傷則內動肺肺動則秋病瘟瘧沂音素沂然寒栗刺皮無傷肉肉傷則內動脾脾動則七十二日四季之月病腹脹煩不嗜食刺肉無傷脈脈傷則內動心心動則夏病心痛刺脈無傷筋筋傷則內動肝肝動則春病熱而筋馳刺筋無傷骨骨傷則內動腎腎動則冬病脹腰痛刺骨無傷髓髓傷則消爍胻酸解亦然不去矣刺骨無傷筋者針至筋而去不及骨也刺筋無傷肉者至肉而去不及筋也刺脈無傷肉者至脈而去不及肉也刺脈無傷皮者至皮而去不及脈也所謂刺皮無傷肉者病在皮中針入皮中無傷肉也刺肉無傷筋者過肉中筋也刺筋無傷骨者過筋中骨也此謂之久也久疑作失夫氣之在脈也邪氣在上濁氣在中清氣在下故針陷脈則邪氣出針中脈則濁氣出針太深則邪氣反沉病益故曰皮肉筋脈各有所宜各不同形各以任其所宜無實實無虛虛損不足而益有餘是謂病甚病益其取五脈者死取三脈者恇奪陰者死奪陽者狂針害華矣二十五五節刺振埃者刺外經去陽病陰氣大逆上滿於胸中憤瞋息肩大氣逆上喘喝坐伏病惡埃煙餳不得息取之天容其咳上氣窮詘胸痛者取之廉泉取天容者無過一里取廉泉者血變而止發蒙者耳無所聞目無所見刺腑輸去腑病刺此必於日中刺其聽宮中其眸子聲聞於耳此其輸也刺邪以手堅按其兩鼻而疾偃其聲必應於針去爪者乃刺關節肢絡腰脊者身之大關節也肢經者人之管以趨翔也莖垂者身中之機陰精之候津液之道也飲食不節喜怒不時津液內溢乃下留於睪血道不通日大不休俯仰不便趨翔不能此病滎然有水不上不下鍍石所取形不可匿常不得蔽徹衣者言盡刺諸陽之奇輸未有常處也是陽氣有餘而陰氣不足陰氣不足則內熱陽氣有餘則外熱內熱相搏熱於懷炭畏綿帛近不可近身又不可近席腠理閉塞則汗不出舌焦唇稿臘干嗌燥飲食不讓美惡於天府大杼三痏又刺中膂以去其熱補足手太陰以去其汗熱去汗稀疾於徹衣解惑者盡知調陰陽補瀉有餘不足相傾移也大風在身血脈偏虛虛者不足實者有餘輕重不得傾側宛伏不知東西不知南北乍上乍下乍反乍覆顛倒無常甚於迷惑瀉其有餘補其不足陰陽平復用針若此疾於解惑二十六五臟病刺肝病者兩脅下滿引小腹令人善怒虛則目䀮䀮無所見耳無所聞善恐如人將捕之取其經厥陰與少陽氣逆則頭痛耳聾不聰取血者心病者胸中痛脅支滿脅下痛膺背肩甲間痛臂內痛虛則胸腹大脅下與腰相引而痛取其經少陰太陽舌下血者其變病刺郤中血者脾病者身重善飢肉痿足不收行善瘈腳下痛虛則腹滿腸鳴飧泄食不化取其經太陽陽明少陰血者肺病者喘咳逆氣肩背痛汗出尻冷陰股膝脾腨胻足皆痛虛則少氣不能報息耳聾嗌乾取其經太陰足太陽之外厥陰內血者腎病者腹大脛腫喘咳身重寢汗出憎風虛則胸中痛大腹小腹痛清厥意不樂取其經少陰太陽血者太陽臟獨至厥喘虛氣逆是陰不足陽有餘也表裡俱當瀉取之下俞陽明臟獨至是陽氣重並也當瀉陽補陰取下俞少陽臟獨至是厥氣也蹺前卒大取之下俞少陽獨至者一陽之過也太陰臟搏者用心省真五脈氣少胃氣不平三陰也宜治其下俞補陽瀉陰一陽獨嘯少陽厥也陽並與上四肢爭張氣滿於腎宜治其經絡瀉陽補陰一陰至厥陰之治也真虛悁心厥氣留薄發為自汗調食和藥治在下俞五臟有疾當取十二原十二原者五臟之所稟三百六十五節氣味也五臟有疾也應出十二原十二原各有所出明知其原觀其應而知五臟之害陽中之少陰肺也其原出於太淵太淵二陽中之太陽心也其原出於大陵大陵二陰中之少陽肝也其原出於太衝太衝二陰中之至陰脾也其原出於太白太白二陰中之太陰腎也其原出於太溪太溪二膏之原出於鳩尾鳩尾一盲之原出於脖胦脖胦一凡此十二原者主治五臟六腑之有疾者也二十七刺弊脈氣盛而血虛者刺之則脫氣脫氣則僕血氣俱盛而陰氣多者其血滑刺之則射陽氣蓄積久留而不瀉者其血黑以濁故不能射新飲而液滲於絡而未合和於血也故血出而汁別焉其不新飲者身中有水久則為腫陰氣積於陽其氣因於絡故刺之血未出而氣先行故腫陰陽之氣其新相得而未和合因而瀉之則陰陽俱脫表裡相離故脫色而蒼蒼然刺之血出多色不變煩悗者刺絡而虛經虛經之屬於陰者陰脫故煩悶陰陽相得而合為痹者此為內溢於經外注於絡如是者陰陽俱有餘雖多出血而弗能虛也帝曰相之奈何曰血脈者盛堅橫以赤上下無常處小者如針大者如筋則而瀉之萬全也故無失數矣失數而反各如其度帝曰針入而肉著者何也曰熱氣因於針則針熱熱則著於針故堅焉妄用砭石後遺身咎此冶之二失也窺門而刺之者死於家中入門而刺之者死於堂上二十八血氣不同形帝曰余聞九針於夫子而行之於百姓百姓之血氣各不同形或神動而氣先針行或氣與針相逢或針以出氣獨行或數刺乃知或髮針而氣逆或數刺病益劇凡此六者各不同形願聞其方岐伯曰重陽之人其神易動其氣易往也重陽之人熇熇高高言語善疾舉足善高心肺之臟氣有餘陽氣滑盛而揚故神動而氣先行重陽之人而神不先行者此人頗有陰者也多陽者多喜多陰者多怒數怒者易解故曰頗有陰其陰陽之離合難故其神不能先行陰陽和調而血氣淖澤滑利故針入而氣出疾而相逢也其陰氣多而陽氣少陰氣沉而陽氣浮者內臟故針已出氣乃隨其後故獨行也人之多陰而少陽其氣沉而氣往難故數刺乃知也針入而氣逆者其氣逆與其數刺病益甚者非陰陽之氣浮沉之勢也此皆粗工之所敗工之所失其形氣無過焉二十九十二絡繆刺繆如紕繆紀綱帝曰余聞繆刺未得其意岐伯曰邪客於皮毛入於孫絡留而不去閉塞不通不得入於經流溢於大絡而生奇病也夫邪客大絡者左注右右注左上下左右與經相干而布於四末其氣無常處不入於經俞命曰繆刺帝曰願聞繆刺以左取右以右取左奈何其與巨刺何以別之曰絡病者其痛與經脈繆處故命曰繆刺邪客於足少陰之絡令人卒心痛暴脹胸脅支滿無積者刺然骨之前出血如食頃而已左取右右取左病新發者取五日已邪客於手少陽之絡令人喉痹舌卷口乾心煩臂外廉痛手不及頭刺手中指次指爪甲上去端如韭葉各一痏壯者立已老者有頃已左取右右取左此新病數日已邪客於手足厥陰之絡令人卒疝暴痛刺足大指爪甲上與肉交者各一痏男子立已女子有頃已左取右右取左邪客於足太陽之絡令人頭項肩痛刺足小指爪甲上與肉交者各一痏立已不已刺外踝下三痏左取右右取左如食頃已邪客於陽明之絡令人氣滿胸中喘息而支胠胸中熱刺手大指次指爪甲上去端如韭葉各一痏左取右右取左如食頃已邪客於臂掌之間不可得屈刺其踝後先以指按之痛乃刺之以月死生為數月生一日一痏二日二痏十五日十五痏十六日十四痏邪客於足陽蹺之脈令人目痛從內眥始刺外踝之下半寸所各二痏左刺右右刺左如行十里頃而已人有所墮墜惡血留內腹中滿脹不得前後先飲利藥此上傷厥陰之脈下傷少陰之絡刺足內踝之下然骨之前血脈出血刺足跗上動脈不已刺三毛上各一痏見血立已左刺右右刺左邪客於手陽明之絡令人耳聾時不聞音刺手大指次指爪甲上去端如韭葉各一痏立聞不已刺中指爪甲上與肉交者立聞其不時聞者不可刺也耳中生風者亦刺之如此數左刺右右刺左凡痹往來無常處者在分肉間痛而刺之以月死生為數用針者隨氣盛衰以為痏數針過其日數則脫氣不及日數則氣不瀉左刺右右刺左病已止不已復刺之如法月生一日一痏二日一痏漸多至十五日十五痏十六日十四痏漸少之邪客於足陽明之經令人鼽衄上齒寒刺足中趾次指爪甲上與肉交者各一痏左刺右右刺左邪客於足少陽之絡令人脅痛不得息咳而汗出刺足小趾次者爪甲上與肉交者各一痏不得息立已汗出立止咳者溫衣飲食一日已左刺右右刺左病立已不已復刺如法邪客於足少陰之絡令人嗌痛不可內食無故善怒氣上走賁上刺足下中央之脈各三痏凡六刺立已左刺右右刺左邪客於足太陰之絡令人腰痛引小腹控䏚不可以仰息刺腰尻之兩胂之上是腰俞以月死生為痏數髮針立已左刺右右刺左邪客於足太陽之絡令人拘攣背急引脅而痛刺之從項始數脊椎俠脊疾按之應手如痛傍刺之三痏立已邪客於足少陽之絡令人留於樞中痛髀不可以舉刺樞中以毫針寒則久留針以月死生為數立已治諸經刺之所過者不病則繆刺之耳聾刺手陽明不已刺其通脈出耳前者齒齲刺手陽明不已刺其脈入齒中者立已邪客於五臟之間其病也脈引而痛時來時止視其病繆刺之於手足爪甲上視其脈出其血間一日一刺一刺不已五刺已繆傳引上齒齒唇寒痛視其手背脈血者出之足陽明中趾爪甲上一痏手大指次指爪甲上一痏立已左取右右取左邪客於手足少陰太陰足陽明之絡此五絡皆會於耳中上絡左角五絡俱竭令人身脈皆動而形無知也其狀若尸或曰尸厥刺其足大趾內側爪甲上去端如韭葉後刺足心後刺足中趾爪甲上各一痏後刺手大指內側去端如韭葉後刺手心主少陰鋭骨之端各一痏立已不已以竹管吹其兩耳易其左角之發方一寸燔治飲以美酒一懷不能飲者灌之立已有痛而經不痛者繆刺之視其皮部有血絡者盡取之此繆刺之數也身形有病九候莫病由繆刺之三十經刺岐伯曰夫邪之客於形也必先舍於皮毛留而不去入於孫絡留而不去入於絡脈留而不去入於經脈內連五臟散於腸胃陰腸俱盛五臟乃傷此邪之從皮毛而入極於五臟之次也如此則治其經焉凡刺之數先視其經脈切而從之審其虛實而調之不調者經刺之不盛不虛以經取之三十一巨刺繆刺刺絡脈巨刺刺經脈痛在於左而右脈病者則巨刺之邪客於經左盛則右病右盛則左病亦有移易者左痛未已而右脈先病如此者必巨刺之必中其經非絡脈也三十二脈刺人迎一盛病在足少陽一盛而躁病在手少陽人迎二盛病在足太陽二盛而躁病在手太陽人迎三盛病在足陽明三盛而躁病在手陽明人迎四盛且大且數名曰溢陽陰溢陽為外格脈口一盛病在足厥陰一盛而躁在手心主脈口二盛病在足少陰二盛而躁在手少陰脈口三盛病在足太陰三盛而躁在手太陰脈口四盛且大且數者名曰溢陰溢陽為內關內關不通死不治人迎與太陰脈口俱盛四倍以上命曰關格關格者與之短期人迎一盛瀉足少陽而補足厥陰二瀉一補日一取之必切而驗之疏取之上氣和乃止人迎二盛瀉中太陽補足少陰二瀉一補二日一取之必切而驗之疏取之上氣和乃止人迎三盛瀉足陽明而補足太陰二瀉一補日二取之必切而險之疏取之上氣和乃止脈口一盛瀉足厥陰而補足少陽二補一瀉日一取之必切而驗之疏而取上氣和乃止脈口二盛瀉足少陰而補足太陽二補一瀉二日一取之必切而驗之疏取之上氣和乃止脈口三盛瀉足太陰而補足陽明二補一瀉日二取之必切而驗之疏而取之上氣和乃止所以日二取之者太陽主胃大富於穀氣故可日二直取之也人迎與脈口俱盛三倍以上命曰陰陽俱溢如是者不開則血脈閉塞氣無所行流淫於中五臟內傷如是者因而灸之則變易而為他病矣三十三淺深上下所宜補須一方實深取之稀按其痏以極出其邪氣一方虛淺刺之以養其脈疾按其痏無使邪氣得入邪氣來也緊而疾穀氣來也徐而和脈實者深刺之以泄其氣脈虛者淺刺之使精氣無得出以養其脈獨出其邪氣刺諸痛者其脈皆實故曰從腰以上者手太陰陽明皆主之從腰以下者足太陰陽明皆主之病在上者下取之病在下者高取之病在頭者取之足病在腰者取之膕病生於頭者頭重生於手者臂重生於足得足重治病者先刺其病所從生者也春氣在毛夏氣在皮膚秋氣在分肉冬氣在筋骨刺此病各以其時為齊故刺肥人者秋冬之齊刺瘦人者春夏之齊病痛陰也痛而以手按之不得者陰也深刺之病在上者陽也病在下者陰也癢者陽也淺刺之病先起於陰者先治其陰而後治其陽病先起於陽者先治其陽而後治其陰刺熱厥者留針反為寒刺寒厥者留針反為熱刺熱厥者二陰一陽刺寒厥者二陽一陰所謂二陰者刺二陰也一陽者刺一陽也久病者邪氣入深刺此者深內而久留之間日而後刺之必先調其左右去其血脈刺道畢矣凡刺之法必察其形氣形肉未脫少氣而脈又躁躁厥者必為繆刺之脈之所居深不見者刺之微內針而久留之以致其空脈氣也脈淺者勿刺按絶其脈乃刺之無令精出獨出其邪氣耳所謂三刺則穀氣出者先淺刺絶皮以出陽邪再刺則陰邪出者少益深絶皮致肌肉未入分肉間也已入分肉之間則穀氣出故刺法曰始淺刺之以逐邪氣而來血氣後刺深之以致陰氣之邪最後刺極深之以下穀氣此之謂也三十四人身左右上下虛實不同刺天不足西北故西北方陰也而人右耳目不如左明也地不滿東南故東南方陽也而人左手足不如右強也東方陽也陽者其精並於上並於上則上明而下虛故使耳目聰明而手足不便也西方陰也陰者其精關於下並於下則下盛而上虛故其耳目不聰明而手足便也故俱感於邪其在上則右甚在下則左甚此天地陰陽所不能全也故邪居之故天有精地有形天有八紀地有五里故能為萬物之父母清陽上天濁陰歸地是故天地之動靜神明之綱紀故能以生長收藏終而復始惟賢人上配天以養頭下象地以養足中傍人事以養五臟天氣通於肺地氣通於嗌風氣通於肝雷氣通於心穀氣通於脾雨氣通於腎六經為川腸胃為海九竅為水注之氣以天地為之陰陽陽之汗以天地之雨明之陽之氣以天地之疾風名之暴風象雷逆氣象陽故治不法天之紀不用地之理則災害至矣故邪風之至疾如風雨故善治者治皮毛其次治肌膚其次治筋脈其次治六腑其次治五臟治五臟者半死半生也故天之邪氣感則害人五臟水穀之寒熱感則害於六腑地之濕氣感則害皮肉筋脈故善用針者從陰引陽從陽引陰以右治左以左治右以我知彼以表知里以觀過與不及之理見微則過用之不殆三十五氣血清濁淺深刺受穀氣者濁受氣者清清者注陰濁者注陽濁而清者上出於咽清而濁者則下行清濁相干命曰亂氣帝曰夫陰清而陽濁濁者有清清者有濁清濁別之奈何岐伯曰氣之大別清者上注於肺濁者下走於胃胃之清氣上出於口肺之濁氣下注於經內積於海帝曰諸陽皆濁何陽濁甚乎岐伯曰手太陽獨受陽之濁手太陰獨受陰之清其清者上走空竅其濁者下行諸經諸陰皆清足太陰獨受其濁清者其氣滑濁者其氣澀此氣之常也故刺陰者深而留之刺陽者淺而疾之清濁相干者以數調之三十六死期不可刺病發於心一日而之肺三日而之肝五日而之脾三日不已死冬夜半夏日中病先發於肺三日而之肝一日而之脾五日而之胃十日不已死冬日入夏日出病先發於肝三日而之脾五日而之胃三日而之腎三日不已死冬日入夏早食病發於脾一日而之胃二日而之腎三日而之膂膀胱十日不已死冬人定夏晏食病先發於胃五日而之腎三日而之膂膀胱五日而上之心二日不已死冬夜半夏日昧病先發於腎三日而之膂膀胱三日而上之心三日而之小腸三日不已死冬大晨夏早晡病先發於膀胱五日而之腎一日而之小腸一日而之心二日不已死冬雞鳴夏下晡諸病以次相傳如是者皆有死期不可刺也間一臟及三四臟者乃可刺也卷二下一五亂刺清氣在陰濁氣在陽滎氣順脈衛氣逆行清濁相干亂於胸中是謂大悗故氣亂於心則煩心密默俯首靜伏亂於肺則俯仰喘喝按手以呼亂於腸胃則為霍亂亂於臂脛則為四厥亂於頭則為厥逆頭重眩僕曰五亂刺者刺之有道乎曰有道以來有道以去審知其道是謂身寶曰願聞其道曰氣在於心者取之手少陰心主之俞氣在於肺者取之於手太陰滎足少陰俞氣在於腸胃者取之足太陰陽明不下者取之三里氣在於頭者取之天柱大杼不知取足太陽滎俞氣在臂足取之先去血脈後取其陽明少陽之滎俞曰補瀉奈何曰徐入徐出謂之道氣補瀉無形謂之同精是非有餘不足也亂氣之相逆也二氣血盛哀足陽明之上血氣盛則髯美長血少氣多則髯短故氣少血多則髯少血氣皆少則無髯兩吻多盡足陽明之下血氣盛則下毛美長至胸血多氣少則下毛美短至臍行則善高舉足足趾少肉足善寒血少氣多則肉而善瘃血氣皆少則無毛有則稀枯悴善痿厥足痹足少陽之上氣血盛則通髯美長血多氣少則通髯美短血少氣多則少髯血氣皆少則無須感於寒濕則善痹骨痛爪枯也足少陽之下血氣盛則脛毛美長外踝肥血多氣少則脛毛美短外踝皮堅而厚血少氣多則胻毛少外踝皮薄而軟血氣皆少則無毛外踝瘦而無肉足太陽之上血氣盛則眉美眉有毫毛血多氣少則惡眉面多少理血少氣多則面多肉血氣和則美色足太陰之下血氣盛則跟肉滿踵堅氣少血多則瘦跟空血氣皆少則善轉筋踵下痛手陽明之上血氣盛則髭美血少氣多則髭惡血氣皆少則無髭手陽明之下血氣盛則腋下毛美手魚肉以溫氣血皆少則手瘦以寒手少陽之上血氣盛則眉美以長耳色美血氣皆少則耳焦惡色手少陽之下血氣盛則手卷多肉以溫血氣皆少則寒以瘦氣少血多則瘦以多脈手太陽之上血氣盛則有多須面多肉以平血氣皆少則面瘦惡色手太陽之下血氣盛則掌肉充滿血氣皆少則掌瘦以寒曰刺之有約乎曰眉美者足太陽之脈氣血多惡眉者氣血少其肥而澤者血氣有餘肥而不澤者氣有餘而血不足瘦而無澤者氣血俱不足審察其形氣有餘不足而調之可以知逆順矣曰婦人無須者無血氣乎曰衝脈任脈皆起於胞中上循背裡為經絡之海其浮而外者循腹右上行會於咽喉別而絡唇口血氣盛則充膚熱肉血獨盛則淡滲皮膚生毫毛今婦人之生有餘於氣不足於血以其數脫血也衝任之脈不滎口唇故須不生焉曰士人有傷於陰陰氣絶而不起陰不用然其須不去其故何也宦者獨去何也曰宦者去其宗筋傷其衝脈血瀉不復皮膚內結唇口不滎故須不生曰其有天宦者未嘗被傷不脫於血然其須不生其故何也曰此天之所不足也其任沖不盛宗筋不成有氣無血唇口不滎故須不生三耐痛人之骨強筋弱肉緩皮膚厚者耐痛其於針石之痛火焫亦然黑色而美骨者耐火焫堅肉薄皮者不耐針石之痛於火焫亦然四五逆帝曰余聞刺有五逆曰病與脈相逆熱病脈靜汗已出脈盛躁是一逆也病泄脈洪大二逆也著脾不移膕肉破身熱脈偏絶三逆也淫而奪形身熱色夭然白及後下血衃血衃篤重四逆也寒熱奪形脈堅搏五逆也五三刺穀氣一刺則陽邪出再刺則陰邪出三刺則穀氣至穀氣至而止所謂穀氣至者已補而實已瀉而虛故已知穀氣至也六熱肝熱病者小便先黃腹痛多臥身熱熱爭則狂言及驚脅滿痛手足躁不得安臥庚辛甚甲乙大汗氣逆則庚辛死刺足厥陰少陽其逆則頭痛員員脈引沖頭也心熱病者先不樂數曰乃熱熱爭則卒心痛煩悶善嘔頭痛面赤無汗壬癸甚丙丁大汗氣逆則壬癸死刺手少陰太陽脾熱病者先頭重頰痛煩心顏青欲嘔身熱熱爭則腰疼不可用俯仰腹滿泄兩頷痛甲乙甚戊己大汗氣逆則甲乙死刺足太陰陽明肺熱病者先淅然厥氣毫毛惡風寒舌上黃身熱熱爭則喘咳痛走胸膺背不得大息頭痛不堪汗出而寒丙丁甚戊己大汗氣逆則甲丁死刺手太陰陽明出血如大豆立已腎熱病者先腰痛胻酸苦渴數飲身熱熱爭則項痛而強胻寒且酸足下熱不欲言其逆則項痛員員淡淡然戊己甚壬癸大汗氣逆則戊己死刺足少陰太陽諸汗者至其所勝日汗出也肝熱病者左頰先赤心熱病者顏先赤脾熱病鼻先赤肺熱病者右頰先赤腎熱病者頤先赤病雖未發見赤色者刺之名曰治未病熱病從部所起者至期而已其刺之反者三周而已重逆則死諸當汗者至其所勝日汗大出也諸治熱病以飲之寒水乃刺之必寒衣之居止寒處身寒而止也熱病先胸脅痛手足躁刺足少陽補足太陰病甚者為五十九刺熱病始手臂痛者刺手陽明太陰而汗出止熱病始於頭首者刺項太陽而汗出止熱病始於足脛者刺足陽明而汗出止熱病先身重骨痛耳聾好冥刺足少陰病甚為五十九刺熱病先眩冒而熱胸脅滿刺足少陰少陽太陽之脈色滎顴骨熱病也榮未交曰今且得汗待時而已與厥陰脈爭見者死期不過三日其熱病內連腎少陽之脈色也少陽之脈色榮頰前熱病也榮未交曰今且得汗待時而已與少陰脈爭見者死期不過三日熱病氣穴三椎下間主胸中熱四椎下間主鬲中熱五椎下間主肝熱六椎下間主脾熱七椎下間主腎熱榮在骶也項上三椎陷者中也頰下逆顴為大瘕下牙車為腹滿顴後為脅痛頰上鬲上也頭上五行行五者以泄諸陽之熱逆也大杼膺俞缺盆背俞此八者以瀉胸中之熱也氣衝三里巨虛上下廉此八者以瀉胃中之熱也雲門髁骨委中髓空此八者以瀉四肢之熱也五臟俞傍五者此十者以瀉五臟六熱也熱病不可刺者九一日汗不出大顴發赤噦者死二曰泄而腹滿甚者死三曰目不明熱不已者死四曰嬰兒熱而腹滿死五曰汗不出嘔下血者死六曰舌本爛熱不已者死七曰咳而衄汗不出出不至足者死八曰髓熱者死九曰熱而痙者死腰折瘛瘲齒噤齦也凡此九者不可刺也七瘧足太陽之瘧令人腰痛頭重寒從背起先寒後熱熇熇暍暍然熱止汁出難已刺郤中出血足少陽之瘧令人身體解亦寒不甚熱不甚惡見人見人心惕惕然熱多汗出甚刺足少陽足陽明之瘧令人先寒灑淅寒甚久乃熱熱去汗出喜見日月光火氣乃快然刺足陽明跗上足太陰之瘧令人不樂好太息不嗜食多寒熱汗出病至則善嘔嘔已乃衰則取之足少陰之瘧令人嘔吐甚多寒熱熱多寒少欲閉戶牖而處其病難已足厥陰之瘧令人腰痛小腹滿小便不利如癃狀非癃也數便意恐俱氣不足腹中悒悒刺足厥陰肺瘧者令人心寒寒甚熱熱間善驚如有所見者刺手太陰陽明心瘧者令人煩心甚欲得清水反寒多不甚熱刺手少陰肝瘧者令人色蒼蒼然太息其狀若死者刺足陰見血脾瘧者令人寒腹中痛熱則腸中鳴鳴已汗出刺足太陰腎瘧者令人淅淅然腰脊痛宛轉大便難目眴眴然手足寒刺足太陽少陰胃瘧者令人且病也善飢而不能食食而支滿腹大刺足陽明太陰橫脈出血瘧發身方熱刺跗上動脈開其空出其血立寒瘧方欲寒刺手陽明太陰足陽明太陰瘧脈滿太急刺背俞用中針傍五胠俞各一適肥瘦出其血也瘧脈小實急灸脛少陰刺指井瘧脈滿大急刺背俞用五胠俞背俞各一適行於血也瘧脈緩大虛便用藥不宜用針凡治瘧先發如食頃乃可以治過之則失時也諸瘧而脈不見刺十指間出血血去必已先視身之赤如小豆者盡取之十二瘧者其發各不同時察其病形以知其何脈之病也先其發時如食頃而刺之一刺則衰二刺則知三刺則已不已刺舌下兩脈出血不已刺郤中盛經出血又刺項已下俠脊者必已舌下兩脈者廉泉也刺瘧者必先問其病之所先發者先刺之先頭痛及重者先刺頭上兩額兩眉間出血先項背痛者先刺之先腰背痛者先刺郤中出血先手臂痛者先刺手少陰陽明十指間先足脛痠痛者先刺中陽明十指間出血風瘧瘧發則汗出惡風刺三陽經背俞之血者胻痠痛甚按之不可名曰跗髓痛病以鑱針針絶骨出血立已身體小痛刺至陰諸陰之井無出血間一日一刺瘧不渴間日而作刺足太陽渴而間日作刺足太陽溫瘧汗不出為五十九刺八腰痛足太陽脈令人腰痛引項脊尻背如重狀刺其郤中太陽正經出血春無見血少陽令人腰痛如以針刺其皮中循循然不可以俯仰不可以顧刺少陽成骨之端出血成骨在膝外廉之骨獨起者夏無見血陽明令人腰痛不可以顧顧如有見者善悲刺陽明於胻前三痏上下和之出血秋無見血足少陰令人腰痛痛引脊內廉刺少陰於內踝上二痏春無見血出血太多不可復也厥陰之脈令人腰痛腰中如張弓弩弦刺厥陰之脈在腨踵魚腹之外循之纍纍然乃刺之其病令人善言默默然不慧刺之三痏解脈令人腰痛痛而引肩目䀮䀮然時遺溲刺解脈在膝筋肉分間郤外廉之橫脈出血血變而止解脈令人腰痛如引帶常如折腰狀善恐刺解脈在郤中結絡如黍米刺之血射以黑見赤血而已同陰之脈令人腰痛痛如小錘居其中怫然腫刺同陰之脈在外踝上絶骨之端為三痏陽維之脈令人腰痛痛上怫然腫刺陽維之脈脈與太陽合腨下間去地一尺所沖絡之脈令人腰痛不可以俯仰仰則恐僕得之舉重傷腰衡絡絶惡血歸之刺之在郤陽筋之間上郤數寸衡居為二痏出血會陰之脈令人腰痛痛上漯漯然汗出汗乾令人欲飲飲已欲走刺直陽之脈上三痏在蹺上郤下五寸橫居視其盛者出血飛陽之脈令人腰痛痛上怫怫然甚則悲以恐刺飛陽之脈在內踝上五寸少陰之前與陰維之會昌陽之脈令人腰痛痛引膺目䀮䀮然甚則反折舌卷不能言刺二筋為二痏在內踝上大筋前太陰後上踝二寸所散脈令人腰痛而熱熱甚生煩腰下如有橫木居其中甚則遺溲刺散脈在膝前骨肉分間絡外廉束脈為三痏肉裡之脈令人腰痛不可以咳咳則筋縮急刺肉裡之脈為二痏在太陽之外少陽絶骨之後腰痛俠脊而痛至頭几几然目䀮䀮然欲僵仆刺足太陽郤中出血腰痛上寒刺足太陽陽明上熱刺足厥陰不可以俯仰刺足少陽中熱而喘刺足少陰刺郤中出血腰痛上寒不可顧刺足陽明上熱刺足太陰中熱而喘刺足少陰大便難刺足少陰如折不可以俯仰不可以舉刺足太陽引脊內廉刺足少陰腰痛引小腹控䏚不可以仰刺腰尻交者兩髁胂上以月死生為痏數髮針立已左取右右取左腰痛不可俯仰急引陰卵刺八髎與痛上八髎在腰尻分間九周痹帝曰周痹之在身也上下移徙隨脈在上下左右相應間不容空願聞此痛在血脈之中耶將在發肉之間乎何以致是其痛之移也間不及下針其慉痛之時不及定治而痛已止矣何道使然願聞其故岐伯曰此衆痹也非周痹也曰顧聞衆痹曰此各在其處更發更止更居更起以右應左以左應右非能周也更發更休也曰刺之奈何曰刺此者痛雖已止必刺其處勿令復起曰善願聞周痹何如曰周痹者在於血脈之中隨脈以上隨脈以下不能左右各當其所曰刺之奈何曰痛從上下者先刺其下以遏之後刺其上以脫之痛從下上者先刺其上以遏之後刺其下以脫之帝曰善此痛安生何因而有名曰風寒濕氣客於分肉之間迫切而為沫沫得寒則聚聚則排分肉而分裂也分裂則痛痛則神歸之神歸之則熱熱則痛解痛解則厥厥則他痹發發則如是帝曰善余已得其意矣此內不在臟而外未發於皮獨居分肉之間真氣不能周故命曰周痹故刺痹者必先切循其下之六經視其虛實及大絡之血結而不通及虛而脈陷空中者而調之尉而通之其瘛堅轉引而行之帝曰善余已得其意矣亦得其事也九者經巽之理十二經脈陰陽之病也十癲狂癲疾者始生先不樂頭重頭痛視舉目赤甚作極已而煩心候之於顏取手太陽陽明太陰血變而止癲疾始作而引口啼呼喘悸者候之手陽明太陽左強者攻其右右強者攻其左血變而止癲疾始作先反僵因而脊痛候之足太陽陽明手太陽血變而止治癲疾常與之居察其所當取之處病至視之有過者瀉之置其血於瓢壺之中至其發時血獨動矣不動灸窮骨二十壯窮骨者骶骨也骨癲疾者䫲齒諸俞分肉皆滿而骨居汗出煩悗嘔多沃沫氣下泄不治脈癲疾者暴僕四肢之脈皆脹而縱脈滿盡刺之出血不滿灸之挾項太陽灸帶脈於腰相去三寸諸分肉本輸嘔多沃沫氣下泄不治癲疾者疾發如狂者死不治狂始生先自悲也喜忘苦怒善恐者得之憂飢治之取手太陰陽明血變而止及取足太陰陽明狂始發少臥不飢自高賢也自辨智也自尊貴也善罵詈日夜不休治之取手陽明太陽太陰舌下少陰視之盛者皆取之不盛釋之也狂言驚善笑好歌妄行不休者得之大恐治之取手陽明太陽太陰狂目妄見耳妄聞善呼者少氣之所生也治之取手太陽太陰陽明足太陰頭兩䫲狂者多食善見鬼神善笑而不發於外者得之有所大喜治之取足太陰太陽陽明後取手太陰太陽陽明狂而新發未應如此者先取曲泉左右動脈及盛者見血有頃已不已以法取之灸骨骶二十壯大熱偏身狂而妄見妄聞妄言視足陽明及大絡取之虛者補之血而實者瀉之因其偃臥居其頭前以兩手四指夾按頸動脈久持之卷而切推下至缺盆中而復止如前熱去乃止此所謂推而散之也病在諸陽脈且寒且熱諸分且寒且熱名曰狂刺之虛脈視分盡熱病已止病初發歲一發不治月一發不治月四五發名曰癲刺諸分諸脈其無寒者以針調之十一頭厥頭痛面若腫起而煩心取之足陽明太陰厥頭痛頭脈痛心悲善泣視頭動脈反盛者刺盡去血後調足厥陰厥頭痛頭貞貞頭重而痛瀉頭上五行行五先取手少陰後取足少陰厥頭痛意善忘按之不得取頭面左右動脈後取足太陰厥陰頭項先痛腰脊為應先取天柱後取足太陽厥頭痛頭痛甚耳前後脈湧有熱一云有動脈瀉出其血後取足少陽真頭痛頭痛甚腦盡痛手足寒至節死不治頭痛不可取於俞者有所擊墮惡血在於內若肉傷痛未已可則刺不可遠取也頭痛不可刺者大痹為惡日作者可令少愈不可已頭半寒痛先取手少陽陽明後取足少陽陽明十二痿帝曰五臟使人痿何也岐伯曰肺主身之皮毛心主身之血脈肝主身之筋膜脾主身之肌肉腎主身之骨髓故肺熱葉焦則皮毛虛弱急薄著則生痿躄也心氣熱則下脈厥而上上則下脈虛虛則生脈痿樞折挈脛縱而不任地也肝氣熱則膽泄口苦筋膜乾筋膜乾則筋急而攣發為筋痿脾氣熱則胃干而渴肌肉不仁發為肉痿腎氣熱則腰脊不舉骨枯而髓減發為骨痿帝曰何以得之曰肺者臟之長也為心之蓋也有所失亡所求不得則發肺鳴鳴則肺熱葉焦故曰五臟因肺熱葉焦發為痿躄此之謂也悲哀太甚則胞絡絶胞絡絶則陽氣內動發則心下崩數溲血故本病曰大經空虛發為肌痹傳為脈痿思想無窮所願不得意淫於外入房太甚宗筋馳縱發為筋痿及為白淫故下經曰筋痿者生於肝使內也有漸於濕以水為事若有所留居處相濕肌肉濡潰痹而不仁發為肉痿故下經曰肉痿者得之濕地也有所遠行勞倦逢大熱而渴渴則陽氣內伐內伐則熱舍於腎腎水臟也今水不勝火則骨柘而髓虛故足不任身發為骨痿故下經曰骨痿者生於大熱也帝曰何以別之曰肺熱者色白而毛敗心熱者色赤而絡脈溢肝熱者色蒼而爪枯脾熱者色黃而肉蠕動腎熱者色黑而齒稿帝曰如夫子言可矣論言治痿者獨取陽明何也岐伯曰陽明者五臟六腑之海主潤宗筋宗筋主束骨而利機關也衝脈者經脈之海也主滲灌溪谷與陽明合於宗筋陰陽總宗筋之會會於氣衝而陽明為之長皆屬於帶脈而絡於督脈故陽明虛則宗筋縱帶脈不引故足痿不用也治之各補其榮而通其俞調其虛空和其逆順筋脈骨肉各以其時受月則病已矣帝曰善十三心痛厥心痛與背相控善瘈如從後觸其心偃僂者腎心痛也先取京骨崑崙髮針不已取然谷厥心痛腹脹胸滿心尤痛甚胃心痛也取之大都太白厥心痛痛如以針刺其心心痛甚者脾心痛也取之然谷太溪厥心痛色蒼蒼如死狀終日不得太息肝心痛也取之行間太衝厥心痛臥若徒居心痛間動作痛益甚色不變肺心痛也取之魚際太淵真心痛手足清至節心痛甚旦發夕死夕發旦死心痛不可刺者中有盛聚不可取於俞心痛引腰脊欲嘔取足太陰心痛腹脹嗇嗇然大便不利取足少陰心痛引背不得息刺足少陰不已取手少陽心痛引小腹上下無常處便溲難刺足厥陰心痛但短氣不足以息刺手太陰心痛當九節刺之按已刺按之立已上下求之得之立已背與心相控而痛所治天突十椎及上紀上紀者胃脘也下紀者關元也背胸邪擊陰陽左右如此十四脹帝曰脈之應於寸口如何而脹岐伯曰其脈大堅以澀者脹也曰何以知臟腑之脹也曰陰為臟陽為腑曰夫氣之令人脹也在於血脈之中耶臟腑之內乎曰三者皆存焉然非脹之舍也曰願聞脹之舍曰夫脹者皆在臟腑之外排臟腑而郭胸脅脹皮膚故命曰脹曰臟腑之在胸脅腹裡之內也若匣匱之臟禁器也各有次舍虛名而同處一域之中其氣各異願聞其故曰未解其意再問曰夫胸腹臟腑之郭也膻中者心主之宮城也胃者太倉也咽喉小腸者傳送也胃之五竅閭里門戶也廉泉玉英者津液之道也故五臟六腑各有畔界其病各有形狀營氣循脈衛氣逆為脈脹衛氣並脈循分為膚脹三里而瀉近者一下遠者三下無問虛實工在疾瀉曰願聞脹形曰夫心脹者煩心短氣臥不安肺脹者虛滿而喘咳肝脹者脅下滿而痛引小腹脾脹者善噦四肢煩悗體重不能勝衣臥不安腎脹腹滿引背央央然腰髀痛六腑脹胃脹者腹滿胃腕痛鼻聞焦臭妨於食大便難大腸脹者腸鳴而痛濯濯冬日重感於寒則飧泄不化小腸脹者小腹䐜脹引腰而痛膀胱脹者小腹滿而氣癃三焦脹者氣滿於皮膚中輕輕然而不堅膽脹者脅下痛脹口中苦善太息凡此諸脹者其道在一明知逆順針數不失瀉虛補實神去其室致邪失正真不可定粗之所敗謂之夭命補虛瀉實神歸其室久塞其空謂之良工曰脹者焉生何因而有曰衛氣之在身也常然並脈循分肉行有逆順陰陽相隨乃得天和五臟更始四時循序五穀乃化然後厥氣在下營氣留止寒氣逆上真邪相攻兩氣相搏乃合為脹也曰善何以解惑曰合之於真三合而得曰善曰脹論言無問虛實工在疾瀉近者一下遠者三下今有其三而不下者其過焉在曰此言陷於肉肓而中氣穴者也不中氣穴則氣內閉針不陷肓則氣不行上越中肉則衛氣相亂陰陽相逐其於脹也當瀉不瀉氣故不下三而不下必更其道氣下乃止不下復始可以萬全烏有殆者乎其干脹也必審其疹當瀉則瀉當補則補如鼓應桴惡有不下者乎帝曰膚脹鼓脹可刺邪曰先瀉其脹之血絡後調其經刺去血絡也腹暴滿按之不下取太陽經絡者胃之募也少陰俞者去脊椎三寸傍五用員利針衛氣逆而脈脹衛氣並脈為膚脹三里而瀉近者一下遠者三下無問虛實三里疾瀉十五胸脅痛胸脅痛而不得息不得臥上氣短氣偏痛脈滿起斜出尻脈絡胸脅支心貫鬲上肩如天突斜下肩交十椎下十六大風風從外入令人振寒汗出頭痛身重惡寒治在風腑調其陰陽不足則補有餘則瀉大風頭項痛刺風腑風腑在上椎大風汗出灸噫嘻在背下俠脊傍三寸所厭之令病人呼噫嘻從風增風刺眉頭失枕在肩上橫骨間病風且寒且熱炅汗了一日數過先刺諸分理絡脈汗出且寒且熱三日一刺百日而已十七癘風癘風者素刺其腫上已刺以鋭針針其處按出其惡氣腫盡乃止骨節重鬚眉墮名大風刺肌肉為故汗出百日刺骨髓汗出百日凡二百日鬚眉生而止針十八偏枯偏枯身偏不用而痛言不變志不亂病在分腠之間巨針取之益其不足損其有餘乃可復也痱之為病身無痛者四肢不收智亂不甚言微知可治甚則不能言不可治也病先起於陽而後入於陰先取其陽後取其陰浮而取之十九痿厥痿厥為四末束悗乃疾解之日二不仁者十日而知無休病已止歲以草刺鼻嚏嚏而已無息而疾迎引之立已大驚之亦可二十癰癰疽之生膿血之成也不從天下不從地出積微之所生也故聖人自治於未有形也愚者遭其已成也膿已成十死一生故聖人弗使已成而明為良方著之竹帛使能者踵而傳之後世無有終時者為其不豫遭也帝曰其已有膿血而後遭乎不導之以小針治乎曰以小治小者其功小以大治大者多害故其已成膿血者其惟砭石鈹鋒之所取也微按其癰視氣所行先淺刺其傍稍內益深還而刺之無過三行察其浮沉以為淺深已刺必尉令熱入中日使熱內邪氣益衰大癰乃潰治腐腫者刺腐上視癰大小深淺刺之刺大者多血小者深之必端內針為故止癰疽不得頃時回癰不知所按之不應手乍來乍已刺手太陰傍三痏與纓脈各二掖癰大熱刺足少陰五刺而熱不止刺手心主三刺手太陰經絡者大骨之會各三暴癰筋緛隨分而痛魄汗不盡胞氣不足治在經俞癰氣之息者宜以針開除去之夫氣盛血聚者宜石而瀉之刺腫搖針左足應立春其日戊寅己丑左脅應春分其日乙卯左手應立夏其日戊辰己巳膺喉首頭應夏至其日丙午右手應立秋其日戊申己未右脅應秋分其日辛酉右足應立冬其日戊戌己亥腰尻下竅應冬至其日壬子六腑膈下三藏應中州其大禁大禁太一所在之日及諸戊己凡此九者善候八正所在之處所主左右上下身體有癰腫者欲治之無以其所值之日潰治之是謂天忌日也二十一鼠瘻鼠瘻之本皆在於臟其末上出於頸腋之間其浮於脈中而未內著於肌肉而外為膿血者易去也請從其本引其末乃可衰去而絶其寒熱審按其道以豫之徐往徐來以去之其小如麥者一刺知三刺而已鼠瘻寒熱刺寒腑寒腑在附膝外解營二十二耳鳴耳痛耳聾耳者宗筋之所聚也胃中空則宗筋虛虛則下溜脈有所竭故耳鳴補客主人手大指爪甲上與肉交者也耳聾而不痛者取足少陽聾而痛者取手陽明耳聾無聞取耳中聽宮耳鳴取耳前動脈耳痛不可刺者耳中有膿若有干耵聹耳無聞也耳聾取手小指次指爪甲上與肉交者先取手後取足耳鳴取手中指爪甲上左取右右取左先取手後取足耳聾取手陽明不已刺其通脈出耳前者二十三膝痛脛酸蹇膝伸不屈治其捷坐而膝痛治其機立而暑解治其骸關膝痛痛及拇指治其膕坐而膝痛如物隱者治其關膝痛不可屈伸治其背內連胻若折治陽明中俞髎若別治巨陽少陰榮淫濼脛酸不能久立治少陽之維在外踝上五寸輔骨上橫骨下為楗俠髖為機膝解為骸關俠膝之骨為連骸骸下為輔輔上為膕膕上為關頭橫骨為枕膝中痛取犢鼻以員利針發而開之針大如釐刺膝無疑二十四齧舌齧頰齧唇重舌少陰氣至則齧舌少陽氣至則齧頰陽明氣至則齧唇視主病者則補之重舌刺舌柱以鈹針也二十五欠陰氣積於下陽氣未盡陽引而上陰引而下陰陽相引故數欠陽氣盡陰氣盛則目瞑陰氣盡陽氣盛則寤矣瀉足少陰補足太陽腎主欠取足少陰二十六噦谷入於胃胃氣上注於肺今有故寒氣與新穀氣俱還於胃新故相亂真邪相攻氣並相連復出於胃故噦補手太陰瀉足少陽二十七唏噫陰氣盛而陽氣虛陰氣疾而陽氣徐陰氣盛而陽氣絶故為唏補足太陽瀉足少陰寒氣客於胃厥逆從下上散復出於胃故為噫補足太陰陽明二十八振寒寒氣客於皮膚陰氣盛陽氣虛故為振寒寒栗補諸陽二十九嚲丁可反胃不實則諸脈虛諸脈虛則筋脈懈惰筋脈懈惰則行陰用事氣不能復故為嚲因其所在補肉分間三十嚏陽氣和利滿於心出於鼻故為嚏補足太陽榮眉本三十一泣竭成盲泣不止則液竭液竭則精不灌精不灌則目無見故命曰奪精補天柱經俠頰項三十二太息憂思則心系急急則氣約氣約則不利故太息以伸出之補手少陰心主足少陽留之也三十三涎下飲食入胃胃中有熱則蟲動蟲動則胃緩胃緩則廉泉開廉泉開故涎下補足少陰涎出者是蛟蛔也以手聚按堅而持之無令得移以大針刺之久持之蟲不動乃出針也三十四口目喎噼足之陽明手之太陽筋急則口目喎噼眥急不能卒視治皆如上方也三十五腸鳴中氣不足溲便為之變腸為之苦鳴下氣不足則為痿厥心悗補足外踝下留之三十六目眩頭傾上氣不足腦為之不滿耳為之苦鳴頭為之苦傾補足外踝下留之三十七喉痹喉痹不能言取足陽明能言取手陽明厥氣走喉而不能言手足清大便不利取足少陰嗌乾口中熱如膠取足少陰喉痹舌卷口中乾煩心心痛臂內廉痛不可及頭取手小指次指爪甲下去端如韭葉三十八齒痛齒痛不惡清飲取足陽明惡清飲取手陽明齒齲刺手陽明不已刺其脈入齒中者立已三十九衄衄而不止衃血流取足太陽衃血取手太陽不已刺腕骨下不已刺膕中出血四十喘中熱而喘取足少陽膕中血絡氣滿胸中喘息取足太陰大指之端去爪甲如韭葉寒則留之熱則疾之氣下乃止四十一怒喜怒而不欲食言益小刺足太陰怒而多言刺足少陽四十二頗若感切刺手陽明頗痛刺足陽明曲周動脈見血立已不已按人迎於經立已四十三項痛項痛不可俯仰刺足太陽不可以顧刺手太陽四十四足足髀不可舉側而取之在樞閣中以員利針大針不可刺陽明虛則宗筋縱帶脈不引故足痿不用也補其榮而通其俞四十五下血病注下血取曲泉四十六疝痛在小腹小腹痛不得大小便名曰疝得之寒刺小腹兩股間刺腰髁骨間刺而多之盡炅病已心疝暴痛取足太陰厥陰盡刺去其血絡四十七轉筋轉筋於陽治其陰轉筋於陰治其陰皆卒刺之轉筋者立而駐之可令遂已四十八厥厥挾脊而痛者至項頭沉沉然目䀮䀮然腰脊強取足太陽膕中血絡厥胸滿面腫唇漯漯然暴言甚則不能言取足陽明厥氣走喉而不能言手足清大便不利取足少陰厥而腹響響然多寒氣腹中谷谷便溲難取足太陰巨陽之厥則腫首頭重足不能行發為眴僕陽明之厥則巔疾欲走呼腹滿不得臥面赤而熱妄見而妄言少陽之厥則暴聾頰腫面熱脅痛胻不可以運太陰之厥則腹滿䐜脹後不利不欲食食則嘔不得臥少陰之厥則口乾溺腹滿心痛厥陰之厥則小腹腫痛腹脹涇溲不利好臥屈膝陰縮腫胻內熱盛則瀉之虛則補之不盛不虛以經取之四十九癇刺癇驚脈五針手太陰各五刺經太陽五刺手少陰經絡膀者一足陽明一上踝五寸刺三針五十霍亂霍亂刺俞傍五陽明及上傍三五十一目痛目中赤痛從內眥始取之陰蹺五十二卒然無音帝曰人之卒然憂恚而地音者何道之塞何氣出行使音不彰願聞其方方少師曰咽喉者水穀之道路也喉嚨分氣之所以上下者也會厭聲音之戶也口唇者聲音之扇也舌者音聲之機也懸雍垂者音聲之關也頏顙者分氣之所泄也橫骨者神氣所使主發舌者也故人之鼻洞涕出不收者頏桑不開氣失也是故厭小而疾薄則發氣疾其開闔利其出氣易其厭大而厚其開闔難其氣出遲故重言人卒然無音者寒氣客於厭則厭不能發發不能下至其開闔不致故無音曰刺之奈何曰足足少陰上繫於舌絡於橫骨終於會厭兩瀉其血脈濁氣乃闢會厭之脈上絡任脈取之天突其厭乃發也五十三目不瞑不臥夫邪氣之客於人也或令人目不瞑不臥者何氣使然伯高曰五穀入於胃也其糟粕津液宗氣分為三隧故宗氣積於胸中出於喉嚨以貫心脈而行呼吸焉榮氣者泌其津液注之於脈化以為血以榮四末內注五臟六腑以應刻數焉衛氣者出其悍氣之慓疾而先行於四未分肉皮膚之間而不休者也晝日行於陽夜日行於陰常從足少陰之分間行於五臟六腑今厥氣客於五臟六腑則衛氣獨衛其外行於陽不得入於陰行於陽則陽氣盛陽氣盛則陽蹺陷不得入於陰陰虛故目不瞑曰治之奈何曰補其不足瀉其有餘調其虛實以通其道而去其邪五十四補遺篇氣交暴郁刺法帝曰升降不前氣交有變即成暴郁余已知之如何預救生靈何得卻乎岐伯曰昭乎哉問臣聞夫子言既明天真須窮法刺可以折郁扶運補弱全真瀉成蠲余令除斯苦帝曰願卒聞之曰壬之不前即有甚凶也木欲升而天柱窒抑之木欲發郁亦須待時當刺足厥陰之井火欲升而天蓬窒抑之土欲發郁亦須待時君火相火同刺包絡之滎土欲升而天衛窒抑之土欲發郁亦須待時當刺足太陰之俞金欲升而天英窒抑之金欲發郁亦須待時當刺手太陰之經水欲升而天芮窒抑之水欲發郁亦煩待時當刺足少陰之合帝曰升之不前可以預備願聞其降可以先防曰既明其升必達其降也升降之道皆可先治也木欲降而地晶窒抑之降而不入抑之郁發散而可得位降而鬱發暴如天間之待時也降而不下郁可速矣降可折其所勝也當刺手太陰之所出刺手陽明之所入火欲降而地玄窒抑之降而不入抑之郁發散而可矣當折其所勝可散其鬱當刺足少陰之所出刺足太陽之所入土欲降而地蒼窒抑之降而不下抑之郁發散而可入當折其勝可散其鬱當刺足厥陰之所出刺足少陽之所入金欲降而地彤窒抑之降面不下抑之郁發散而可入當折其勝可散其鬱當刺心包絡所出刺手少陽所入也水欲降而地阜窒抑之降而不下抑之郁發散而可入當折其土可散其鬱當刺足太陰之所出刺足陽明之所入帝曰五運之至有前後與升降往來有所承抑之可得聞乎刺法岐伯曰當取其化源也是故太過取之不及資之太過取之次抑其鬱取其運之化源令折鬱氣不及扶資以扶運氣以避虛邪也資取之法令出密語五十五司天不遷正刺法帝曰升降之刺以知要願聞司天未得遷正使司化之失其常政即萬化之或其皆妄然與民為病可得先除欲濟群生願聞其説岐伯曰悉乎哉問言其至理聖念慈憫欲濟群生臣乃盡陳斯道可申洞微太陽復布即厥陰不遷正不遷正氣塞於上當瀉足厥陰之所流厥陰復布少陰不遷正不遷正即氣塞於上當刺心包絡脈之所流少陰復布太陰不遷正不遷正即氣留於上當刺足太陰之所流太陰復布少陽不遷正不遷正則氣塞未通當刺手少陽之所流少陽復布則陽明不遷正不遷正則氣未通上當刺手太陰之所流陽明覆布太陽不遷正不遷正則復塞其氣當刺足少陰之所流五十六司氣有餘不退位刺法帝曰遷正不前心通其要願聞不退欲折其餘無令過失可得明乎岐伯曰氣過有餘復作布政是名不過位也使地氣不得後化新司天未得遷正故復布化令如故也己亥之歲天數有餘故厥陰不退位也風行於上木化布天當刺足厥陰之所入子午之歲天數有餘故少陰不退位也熱行於上火余化布天當刺手厥陰之所入丑未之歲天數有餘故太陰不退位也濕行於上雨化布天當刺足太陰之所入寅申之歲天數有餘故少陽不退位也熱行於上火化布天當刺手少陽之所入卯酉之歲天數有餘故陽明不退位也金行於上燥化布天當刺手太陰之所入辰戌之歲天數有餘故太陽不退位也寒行於上凜水化布天當刺足少陰之所入故天地氣逆化成民病以法刺之預可平疴劉溫舒曰或者謂歲運大角木王土衰迎取之當使瀉肝經而益其脾胃人人如此何病之有此非通論也何哉豈有人人臟腑皆同者假如肝元素虛脾土素盛遇此大角之運肝木稍實脾氣得平方獲安和若便瀉肝補脾此所謂實實虛虛損不足益有餘餘氣同法針之治病病對穴可謂工也五十七司氣失守刺帝曰剛柔二干失守其位使天運之氣皆虛乎與民為病可得平乎岐伯曰深乎哉問明其奧旨天地迭移三年化疫是謂根之可見必有逃門假令甲子剛柔失守剛未正柔孤而有虧時序不令即音律非從如此三年變大疫也詳其微甚察其淺深欲至而可刺刺之當先補腎俞次三日可刺足太陰之所注又有下位已卯不至而甲子孤立者次三年作土癘其法補瀉一如甲子同法也假令丙寅剛柔失守上剛乾失守下柔不可獨主之中水運非太過不可執法而定之布天有餘而失守上正天地不合即律呂音異如此即天運失序後三年變疫詳其微甚差有大小徐至即後三年至甚即首三年當先補心俞次五日可刺腎之所入又有下位地甲子辛已柔不附剛亦名失守即地運皆虛後三年變水癘即刺法皆如此矣其刺如畢慎其大喜欲情於中如不忌即其氣復散也令靜七日心欲實令少思假令瘐辰剛柔失守上位失守下位無合乙庚金運故非相招布天未退中運勝來上下相錯謂之失守姑洗林鐘商音不應也如此即天運化易三年變大疫詳其天數差有微甚微即微三年至甚即甚三年至當先補肝俞次三日可刺肺之所行刺畢可靜神七日慎勿大怒怒必真氣卻散之又或在下地甲子乙未失守者即乙柔干即上庚獨治之亦名失守者即天運孤主之三年變癘名曰金癘其至待時也詳其地數之差等亦推其微甚可知遲速爾諸位乙庚失守刺法同肝欲平即勿怒假令壬午剛柔失守上壬未遷正下丁獨然即雖陽年虧及不同上下失守相招其有期差之微甚各有其數也律呂二角失而不和同音有日微甚如見三年大疫當刺脾之俞次三日可刺肝之所出也刺畢靜神七日勿大醉歌樂其氣復散又勿飽食勿食生物欲令脾實氣無滯飽無久坐食無太酸無食一切生物宜甘宜淡又或地下甲子丁酉失守其位未得中司即氣不當位下不與壬奉合者亦名失守非名合德故柔不附剛即地運不合三年變癘其刺法如一木疫之法假令戊申剛柔失守戊癸雖火運陽年不太過也上失其剛柔地獨主其氣不正故有邪干迭移其位差有淺深欲至將合音律先同如此天運失時三年之中火疫至矣當刺肺之俞刺畢靜神七日勿大悲傷也悲傷即肺動而真氣復散也人欲實肺者要在息氣也又或地下甲子癸亥失守者即柔失守位也即上失其剛也即亦名戊癸不相合德者也即運與地虛後三年變癘卻名火癘是故立地五年以明失守以窮法刺於是疫之與癘即是上下剛柔之名也窮歸一體也即刺疫法只有五法即總其諸位失守故只歸五行而統之也五十八全真刺帝曰人虛即神遊失守位使鬼神外干是致夭亡何以全真願聞刺法岐伯曰昭乎哉問謂神移失守雖在其體然不致死或有邪干故令夭壽只如厥陰失守天以虛人氣肝虛感天重虛即魂遊於上邪干厥陰大氣身溫猶可刺之刺其足少陽之所過次刺肝之俞人病心虛又遇君相二火司天失守感而三虛遇火不及黑尸鬼犯之令人暴亡可刺手少陽之所過復刺心俞人脾病又遇太陰司天夭守感而三虛又遇土不及青尸鬼邪犯之於人令人暴亡可刺足陽明之所過復刺脾之俞人肺病遇陽明司天失守感而三虛又遇金不及有赤尸鬼幹人令人暴亡可刺手陽明之所過復刺肺俞人腎病又遇太陽司天失守感而三虛又遇木運不及之年有黃尸鬼犯人正氣吸人神魂致暴亡可刺足太陽之所過刺足少陰之俞五十九十二臟邪干刺帝曰十二臟之相使神失位使神彩之不圓恐邪干犯治之可刺願聞其要岐伯曰悉乎哉問至理道真宗此非聖帝焉究斯源是謂氣神合道契符上天心者君主之官神明出焉可刺手少陰之源肺者相傅之官治節出焉可刺手太陰之源肝者將軍之官謀慮出焉可制足厥陰之源膽者中正之官決斷出焉可刺足少陽之源膻中者臣使之官喜樂出焉可刺心包絡所流脾為諫義之官知周出焉可刺脾之源胃為倉廩之官五味出焉可刺胃之源大腸者傳送之官變化出焉可刺大腸之源小腸者受盛之官化物出焉可刺小腸之源腎者作強之官伎巧出焉可刺腎之源三焦者決瀆之官水道出焉刺三焦之源膀胱者州都之官精液藏焉氣化則能出矣刺膀胱之源凡此十二官者不得相失也是故刺法有全神養真之理亦法有修真之道非治疾也故要修養和神也灸法六十艾灸方宜北方者天地所閉藏之域也其地高陵居風寒冰冽其民樂野處而乳食臟寒生滿病其治宜灸焫故灸焫者亦從北方來六十一艾灸補瀉氣盛則瀉之虛則補之以火補者毋吹其火須自滅也以火瀉者疾吹其火傳其艾須其火滅也絡滿經虛灸陰刺陽經滿絡虛刺陰灸陽陷下則灸之針所不為灸之所宜陰陽皆虛火自當之經陷下者火則當之經絡堅系火所治之六十二灸寒熱灸寒熱之法先灸大椎以年為壯數次灸撅骨以年為壯數視背俞陷者灸之舉臂肩上陷者灸之兩季脅之間灸之外踝上絶骨之端灸之足小趾次趾間灸之腨下陷脈灸之外踝後灸之缺盆骨上切之堅動如筋者灸之膺中陷骨間灸之臍下關元三寸灸之毛際動脈灸之膝下三寸分間灸之足陽明跗上動脈灸之巔上一灸之六十三女子敗疵發於脅名曰敗疵敗疵者女子之病也灸之六十四灸癰王臟癰發四五日逞灸之六十五犬咬犬齧犬所齧處灸之三壯即以犬傷病法灸之當灸二十九處六十六傷寒苦樂傷食灸之形樂志苦病生於脈治之以灸刺六十七宜灸不宜刺背中大俞在杼骨之端肺俞在三焦之間心俞在五焦之間鬲俞在七焦之間肝俞在九焦之間脾俞在十一焦之間腎俞在十四焦之間皆挾脊相去三寸所則欲得而驗之按其處應其中而痛解乃其俞也灸之則可刺之則不可武按血氣形志論及遺篇刺法論並載五臟俞刺而此云可灸不可刺故滄州翁謂素問非出於一時之言非成於一人之手焦當作椎又按華陀傳彭城樊阿皆從陀學凡醫咸言背及胸臟之間不可妄針針之不過四分而阿針背入一二寸巨闕胸臟乃五六寸而病皆瘳是知素問立言致謹之道而明醫縱橫變化不拘於常法而卒與法會也
