body:
  text: 卷一難經一補瀉七十八難曰針有補瀉何謂也然補瀉之法非必呼吸出內針也紀氏曰呼盡而內針吸而引針者為補吸則內針呼盡出針為瀉此言補瀉之時非必呼吸出內而已然知為針者信其左不知為針者信其右紀氏曰然知為針信其左者以左調右有餘不足補瀉於滎俞也不知為針者信其右但一心用針不知以左調右也當刺之時先以左手壓按所針滎俞之處彈而努之爪而下之其氣之來如動脈之狀順針而刺之得氣因推而內之是謂補動而伸之是謂瀉不得氣乃與男外女內不得氣是謂十死不治也滑氏曰彈而努之努讀作怒爪而下之掏之稍重皆欲致其氣之至也氣至指下如動脈之狀乃乘其至而刺之順猶循也乘也停針待氣氣至針動是得氣也因推針而內之是謂補動針而伸之是謂瀉此越人心法非呼吸出內也是固然也若停針候氣久而不至乃與男子則淺其針而候之衛氣之分女子則深其針而候之榮氣之分如此而又不得氣是謂其病終不可治也篇中前後二氣字不同不可不辨前言氣之來如動脈之狀未刺之前左手所候之氣也後言得氣不得氣針下所候之氣也此自兩節周仲立乃云凡候氣左手宜略重候之不得乃與男則少輕其手於衛氣之分以候之女則重其手於榮氣之分以候之如此則既無前後之分又昧停針待氣之道尚何所據為補瀉耶六十九難曰經言虛者補之實者瀉之不虛不實以經取之何謂也然虛者補其母實者瀉其子當先補之然後瀉之不虛不實以經取之是正經自病不中他邪也當自取其經故言以經取之滑氏曰靈樞第十篇載十二經皆有盛則瀉之虛則補之不盛不虛以經取之虛者補其母實者瀉其子子能令母實母能令子虛假令肝病虛即補厥陰之合曲泉是也實則瀉厥陰之滎行間是也先補後瀉即後篇陽氣不足陰氣有餘當先補其陽而後瀉其陰之意若於此義不屬非闕誤則羨文也不實不虛以經取之者即四十九難憂愁思慮則傷心形寒飲冷則傷肺恚怒氣逆則傷肝飲食勞倦則傷脾久坐濕地強力入水則傷腎蓋正經之自病者也楊氏曰不實不虛是諸藏不相乘也故云自取其經七十六難曰何謂補瀉當補之時何所取氣當瀉之時何所置氣然當補之時從衛取氣當瀉之時從榮置氣其陽氣不足陰氣有餘當先補其陽而後瀉其陰陰氣不足陽氣有餘當先補其陰而後瀉其陽榮衛通行此其要也滑氏曰靈樞五十二篇曰浮氣不循經者為衛氣其精氣之行於經者為榮氣蓋補則取浮氣之不循經者以補虛處瀉則從榮置其氣而不用也置猶棄置之置然人之病虛實不一補瀉之道亦非一也是以陽氣不足而陰氣有餘則先補陽而後瀉陰以和之陰氣不足而陽氣有餘則先補陰而後瀉陽以和之如此則榮衛自然通行矣七十五難曰經言東方實西方虛瀉南方補北方何謂也然金木水火土當更相平東方木也西方金也木欲實金當平之火欲實水當平之土欲實木當平之金欲實火當平之水欲實土當平之東方肝也則知肝實西方肺也則知肺虛瀉南方火補北方水南方火火者木之子也北方水水者木之母也水勝火子能令母實母能令子虛故瀉火補水欲令金不得平木也經曰不能治其虛何問其餘此之謂也滑氏曰金不得平木不字疑衍東方實西方虛瀉南方補北方者木金火水欲更相平也木火土金水之欲實五行之貪勝而務權也金水木火土之相平以五行所勝而制其貪也經曰一臟不平所勝平之東方肝也西方肺也東方實則知西方虛矣若西方不虛則東方安得而過於實耶或瀉或補要亦抑其甚而濟甚不足損過就中之道也水能勝火子能令母實母能令子虛瀉南方火者奪子之氣使食母之有餘補北方水者益子之氣使不食於母也如此則過者退抑者進金得平其木而東西二方無復偏勝偏虧之患矣越人之意大抵謂東方過於實而西方之氣不足故瀉火以抑其木補水以濟其金是乃使金得與木相停故曰欲令金得平木也若曰欲令金不得平木則前後文義窒礙竟說不通使肝木不過肺金不虛復瀉火補水不幾於實實虛虛耶八十一難文義正與此互相發明九峰蔡氏謂水火金木土谷惟修取相勝以泄其過其意亦同故結句云不能治其虛何問其餘若為知常而不知變者之戒也此篇大意在肝實肺虛瀉火補水上或問子能令母實母能令子虛當瀉火補土為是蓋子有餘則不食母之氣母不足則不能蔭其子瀉南方火乃奪子之氣使食母之有餘補中央土則益母之氣使得以蔭其子也今乃瀉火補水何歟曰此越人之妙一舉而兩得之者也且瀉火一則以奪木之氣一則以去金之克補水一則以益金之氣一則以制火之光若補土則一於助金而已不可施於兩用此所以不補土而補水也或又問母能令子實子能令母虛五行之道也今越人乃謂子能令母實母能令子虛何哉曰是各有其說也母能令子實子能令母虛者五行之生化子能令母實母能令子虛者針家之予奪固不相侔也四明陳氏曰仲景云木行乘金名曰橫內經曰氣有餘則制己所勝而侮所不勝木實金虛是木橫而凌金侮所不勝也木實本以金平之然以其氣正強而橫金平之則兩不相伏而戰戰則實者亦傷虛者亦敗金虛本資氣於土然其時土亦受制未足以資之故取水為金之子又為木之母於是瀉火補水使水勝火則火餒而取氣於木木乃減而不復實水為木母此母能令子虛也木既不實其氣乃平平則金免木凌而不復虛水為金子此子能令母實也所謂金不得平木不得逕以金平其木必瀉火補水而旁治之使木金之氣自然兩平耳今按陳氏此說亦自有理但為不之一字所纏未免牽強費辭不若直以不字為衍文爾觀八十一難中當知金平木一語可見矣王安道曰余每讀至此未嘗不嘆夫越人之得經旨而悼夫後世之失經旨也先哲有言凡讀書不可先看註解且將經文反復而詳味之得自家有新意卻以註解參校庶乎經意昭然而不為他說所蔽若先看註解則被其說橫吾胸中自家卻無新意矣余平生佩服此訓所益甚多且如難經此篇其言周備純正足為萬世法後人紛紛之論其可憑乎夫實則瀉之虛則補之此常道也實則瀉其子虛則補其母亦常道也人皆知之今肝實肺虛乃不瀉肝而瀉心此則人亦知之至於不補肺補脾而補腎此則人不能知惟越人知之耳夫子能令母實母能令子虛以常情觀之則曰心火實致肝木亦實此子能令母實也脾土虛致肺金亦虛此母能令子虛也心火實固由自主脾土虛乃由肝木製之法當瀉心補脾則肝肺皆平矣越人則不然其子能令母實子謂火母謂木固與常情無異其母能令子虛母謂水子謂木則與常情不同矣故曰水者木之母也子能令母實一句言病因也母能令子虛一句言治法也其意蓋曰火為木之子子助其母使之過分而為病矣今將何以處之惟有補水瀉火之治而已夫補水者何謂也蓋水為木之母若補水之虛使力可勝火火勢退而木勢亦退此則母能虛子之義所謂不治之治也此虛字與精氣奪則虛之虛字不同彼虛謂耗其真而致虛此虛謂抑其過而欲虛之也若曰不然則母能令子虛一句將歸之脾肺乎既歸於脾肺今何不補脾乎夫五行之道其所畏者畏所克耳今火大王水大虧火何畏乎惟其無畏則愈王而莫能制苟非滋水以求勝之孰能勝也水勝火三字此越人寓意處細觀之勿輕忽也雖瀉火補水並言然其要又在補水耳後人乃言濁瀉火而不用補水又曰瀉火即是補水得不大違越人與經之意乎若果不用補水經不必言補北方越人不必言補水矣雖水不虛而火獨暴王者固不必補水亦可也若先因水虛而致火王者不補水可乎水虛火王而不補水則藥至而暫息藥過而復作將積年累月無有窮已安能絕其根哉雖苦寒之藥通為抑陽扶陰不過瀉火邪而已終非腎藏本藥不能滋養北方之真陰也欲滋真陰舍地黃黃柏之屬不可也且夫肝之實也其因有二心助肝肝實之一因也肺不能制肝肝實之二因也肺之虛也其因亦有二心克肺肺虛之一因也脾受肝克而不能生肺肺虛之二因也今補水而瀉火火退則木氣削又金不受克而制木東方不實矣金氣得平又土不受克而生金西方不虛矣若以虛則補母言之肺虛則當補脾豈知肝氣正盛剋土之深雖每日補脾安能敵其正盛之勢哉縱使土能生金金受火克亦所得不償所失矣此所以不補土而補水也或疑木王補水恐水生木而木愈王故聞獨瀉火不補水論忻然而從之殊不知木已王矣何待生乎況水之虛雖峻補尚不能復其本氣安有餘力生木哉若能生木則能勝火矣或又謂補水者欲其不食於母也不食於母則金氣還矣豈知火剋金土不生金金之虛已極尚不能自給水雖欲食之何所食乎若如此則金虛不由於火之克土之不生而由於水之食爾豈理也哉縱水不食金金亦未必能復常也金不得平木一句多一不字所以瀉火補水者正欲使金得平木也不字當刪去不能治其虛何問其餘虛指肺虛而言也瀉火補水使金得平木正所謂能治其虛不補土不補金乃瀉火補水使金自平此法之巧而妙者苟不能曉此法而不能治此虛則不須問其他必是無能之人矣故曰不能治其虛何問其餘若夫上文所謂金木水火土更相平之義不勞解而自明茲故弗具也夫越人亞聖也論至於此敢不斂衽但恨說者之斁蝕故辨之武按滑氏受針法於東平高洞陽故以針法補瀉注豈王氏不習針故以用藥論而補瀉之理明矣若經旨則針藥皆通七十二難曰經言能知迎隨之氣可令調之調氣之方必在陰陽何謂也然所謂迎隨者知榮衛之流行經脈之往來也隨其順逆而取之故曰迎隨滑氏曰迎隨之法補瀉之道也迎者迎而奪之隨者隨而濟之然必知榮衛之流行經脈之往來榮衛流行經脈往來其義一也知之而後可以視夫病之逆順隨其所當而為視瀉也四明陳氏曰迎者迎其氣之方來而未盛也以瀉之隨者隨其氣之方往來未虛也以補之愚按迎隨有二有虛實迎隨有子母迎隨陳氏之說虛實迎隨也若七十九難所載子母迎隨也調氣之方必在陰陽知其內外表里隨其陰陽而調之故曰調氣之方必在陰陽滑氏曰在察也內為陰外為陽表為陽里為陰察其病之在陰在陽而調之也楊氏曰高氣之方必在陰陽者陰虛陽實則補陰瀉陽陰虛陰實則補陽瀉陰或陽並於陰陰並於陽或陰陽俱虛俱實皆隨其所見而調之謝氏曰男外女內表陽里陰調陰陽之氣者如從陽引陰從陰引陽陽病治陰陰病治陽之類也七十九難曰經言迎而奪之安得無虛隨而濟之安得無實虛之與實若得若失實之與虛若有若無何謂也滑氏曰出靈樞第一篇得求而獲也失縱也遺也其第二篇曰言實與虛若有若無者謂實者有氣虛者無氣也言虛與實若得若失者謂補者必然若有得也瀉者怳然若有失也即第一篇之義然迎而奪之者瀉其子也隨而濟之者補其母也假令心病瀉手心主俞是謂迎而奪之者也補手心主井是謂隨而濟之者也滑氏曰迎而奪之者瀉也隨而濟之者補也假令心病心火也土為火之子手心主之俞太陵也實則瀉之是迎而奪之也木者火之母手心主之井中衝也虛則補之是隨而濟之也迎者迎於前隨者隨其後此假心為例而補瀉則雲手心主即靈樞所謂少陰無俞者也當與六十六難並觀潔古曰呼吸出納亦名迎隨也所謂實之與虛者牢濡之意也氣來實牢者為得濡虛者為失故曰若得若失也滑氏曰氣來實牢濡虛以隨濟迎奪而為得失也前云虛之為實若得若失實之與虛若有若無此言實之與虛若得若失蓋得失有無義實相同互舉之省文耳八十一難曰經言有見如入有見如出者何謂也然所謂有見如入者謂左手見氣來至乃內針針入見氣盡乃出針是謂有見如入有見如出也滑氏曰所謂有見如入下當欠有見如出四字如讀為而孟子書望道而未之見而讀為如蓋通用也有見而入出者謂左手按穴待氣來至乃下針針入候其氣應盡而出針也紀氏曰針之出入皆隨氣往來素問曰見其烏烏見其稷稷從見其飛不知其誰伏如橫努起如發機是也素問寶命全形論文二補瀉相反八十一難曰經言無實實虛虛損不足而益有餘是寸口脈耶將病自有虛實耶其損益奈何然是病非謂寸口脈也謂病自有虛實也假令肝實而肺虛肝者木也肺者金也金木當更相平當知金平木假令肺實而肝虛微少氣用針不補其肝而反重實其肺故曰實實虛虛損不足而益有餘此者中工之所害也滑氏曰是病二字非誤即衍肝實肺虛金當平木如七十五難之說若肺實肝虛則當抑金而扶木也用針者乃不補其肝而反重實其肺此所謂實其實而虛其虛損不足而益有餘殺人必矣中工猶云粗工也十二難曰五臟脈已絕於內用針者反實其外五臟脈已絕於外用針者反實其內內外之絕何以別之然五臟脈已絕於內者腎肝氣已絕於內也而醫反補其心肺五臟脈已絕於外者其心肺脈已絕於外也而醫反補其腎肝陽絕補陰陰絕補陽是謂實實虛虛損不足益有餘如此死者醫殺之耳滑氏曰靈樞第一篇曰凡將用針者必先診脈視氣之劇易乃可以治也又第三篇曰所謂五臟之氣已絕於內者脈口氣內絕不至反取外之病處與陽經之合有留針以致其陽氣陽氣至則內重竭重竭則死矣其死也無氣以動故靜所謂五臟之氣已絕於外者脈口氣外絕不至反取其四末之輸有留針以致其陰氣陰氣至則陽氣反入入則逆逆則死矣其死也陰氣有餘故躁此靈樞以脈口內外言陰陽也越人以心肺腎肝內外別陰陽其理亦猶是也紀氏謂此篇言針法馮氏謂合入用針補瀉之類三針刺淺深七十難曰春夏刺淺秋冬刺深者何謂也然春夏者陽氣在上人氣亦在上故當淺取之秋冬者陽氣在下人氣亦在下故當深取之滑氏曰春夏之時陽氣浮而上人之氣亦然故刺之當淺欲其無太過也秋冬之時陽氣沉而下人之氣亦然故刺之當深欲其無不及也經曰必先歲氣無伐天和此之謂也四明陳氏曰春氣在毛夏氣在皮秋氣在分肉冬氣在骨髓是淺深之應也七十一難曰經言刺榮無傷衛刺衛無傷榮何謂也然針陽者臥針而刺之刺陰者先以左手攝按所針榮俞之處氣散乃內針是謂刺榮無傷衛刺衛無傷榮也滑氏曰榮為陰衛為陽榮行脈中衛行脈外各有淺深也用針之道亦然針陽必臥針而刺之者以陽氣輕浮過之恐傷於榮也刺陰者先以左手按所刺之穴良久令氣散乃內針不然則傷衛氣也無毋通禁止辭四先後淺深七十難曰春夏各致一陰秋冬各致一陽何謂也然春夏溫必致一陰者初下針沉之至腎肝之部得氣引持之陰也秋冬寒必致一陽者初內針淺而浮之至心肺之部得氣推內之陽也是謂春夏必致一陰秋冬必致一陽滑氏曰致取也春夏氣溫必致一陰者春夏養陽之義也初下針即沉之至腎肝之部俟其得氣乃引針而提之以至於心肺之分所謂致一陰也秋冬氣寒必致一陽者秋冬養陰之義也初內針淺而浮之當心肺之部俟其得氣推針而內之以達於腎肝之分所謂致一陽也此篇致陰陽之說越人特推其理有如是者爾凡用針補瀉自有所宜初不必以是相拘也五井滎俞經合主病六十八難曰五臟六腑各有井滎俞經合皆何所主然經言所出為井所流為滎所注為俞所行為經所入為合井主心下滿滎主身熱俞主體重節痛經主喘咳寒熱合主逆氣而泄此五臟六腑井滎俞經合所主病也滑氏曰主主治也井谷井之井水源之所出也滎絕小水也井之源本微故所流尚小而為滎俞輸也注也自滎而注乃為俞也由俞而經過於此乃謂之經由經而入於所合謂之合合者會也靈樞第一篇曰五臟五俞五五二十五俞六腑六俞六六三十六俞此俞字空穴之總名凡諸空穴皆可以言俞經脈十二絡脈十五凡二十七氣所行皆井滎俞經合之所繫而所主病各不同並主心下滿肝木病也足厥陰之支從肝別貫鬲上注肺故井主心下滿滎主身熱心火病也俞主體重節痛脾土病也經主喘咳寒熱肺金病也合主逆氣而泄腎水病也謝氏曰此舉五臟之病各一端為例余病可以類推而互取也不言六腑者舉臟足以該之項氏曰井象水之泉滎象水之陂俞象水之窬經象水之流合象水之歸皆取水之義也紀氏曰井之所治不以五臟六腑皆主心下滿滎之所治不以五臟六腑皆主身熱俞之所治不以五臟六腑皆主體重節痛經之所治不以五臟六腑皆主喘咳寒熱合之所治不以五臟六腑皆主逆氣而泄俱言臟不言腑者恐未中理六四時井滎俞經合刺七十四難曰經言春刺井夏刺滎季夏刺俞秋刺經冬刺合者何謂也然春刺井者邪在肝夏刺滎者邪在心季夏刺俞者邪在脾秋刺經者邪在肺冬刺合者邪在腎滑氏曰滎俞之系四時者以其邪各有所在也其肝心脾肺腎而繫於春夏秋冬者何謂也然五臟一病輒有五也假令肝病色青者肝也臊臭者肝也喜酸者肝也喜呼者肝也喜泣者肝也其病眾多不可盡言也四時有數而並繫於春夏秋冬者也針之要妙在於秋毫者也滑氏曰五臟一病不止於五尤眾多也雖其眾多而四時有數故並繫於春夏秋冬及井滎俞經合之屬也用針者必精察之詳此篇文義似有缺誤今且依此解之以俟知者七臟腑滎俞合皆以井為始六十三難曰十變言五臟六腑滎合皆以井為始者何也然井者東方春也萬物之始生諸蚑行喘息蝟飛蠕動當生之物莫不以春生故歲數始於春日數始於甲故以井為始也蚑去知切蠕音軟滑氏曰十二經所出之穴皆謂之井而以為滎俞之始者以井主東方木木者春也萬物發生之始諸蚑者行喘者息息謂噓吸氣也公孫弘傳作蚑行喙息義尤明白蝟者飛蠕者動皆蟲豸之屬凡當生之物皆以春而生是以歲之數則始於春日之數則始於甲人之滎合則始於井也馮氏曰井谷井之井泉源之所出也四明陳氏曰經穴之氣所在則自井始而留滎注俞過經入合故以萬物及歲月日數之始為譬也八臟腑井滎為五六六十二難曰臟井滎有五腑獨有六者何謂也然腑者陽也三焦行於諸陽故置一俞名曰原腑有六者亦與三焦共一氣也滑氏曰臟之井滎有五謂井滎俞經合也腑之井滎有六以三焦行於諸陽故又置一俞而名曰原所以腑有六者與三焦共一氣也虞氏曰此篇疑有缺誤當與六十六難參考九陰陽井滎木金相生不同六十四難曰十變又言陰井木陽井金陰滎火陽滎水陰俞土陽俞木陰經金陽經火陰合水陽合土滑氏曰十二經起於井穴陰井為木故陰井木生陰滎火陰滎火生陰俞土陰俞土生陰經金陰經金生陰合水陽井為金故陽井金生陽滎水陽滎水生陽俞木陽俞木生陽經火陽經火生陽合土陰陽皆不同其意何也然是剛柔之事也陰井乙木陽井庚金陽井庚金者乙之剛也陰井乙木者庚之柔也乙為木故言陰井木也庚為金故言陽井金也余皆仿此滑氏曰剛柔者乙庚之相配也十干所以自乙庚而言者蓋諸臟腑穴皆始於井而陰脈之井始於乙木陽脈之井始於庚金故自乙庚而言剛柔之配而其餘五行之配皆仿此也丁氏曰剛柔者謂陰井木陽井金庚金為剛乙木為柔陰滎火陽滎水壬水為剛丁火為柔陰俞土陽俞木甲木為剛己土為柔陰經金陽經火丙火為剛辛金為柔陰合水陽合土戊土為剛癸水為柔蓋五行之道相生者母子之義相剋相制者夫婦之類故夫道皆剛婦道皆柔自然之理也易曰分陰分陽迭用柔剛其是之謂歟十出井入合六十五難曰經言所出為井所入為合其法奈何然所出為井井者東方春也萬物之始生故言所出為井也所入為合合者北方冬也陽氣入臟故言所入為合也滑氏曰此以經穴之流注始終言也十一欲刺井當刺滎七十三難曰諸井者肌肉淺薄氣少不足使也刺之奈何然諸井者木也滎者火也火者木之子當刺井者以滎瀉之故經言補者不可以為瀉瀉者不可以為補此之謂也滑氏曰諸經之井皆在手足指梢肌肉淺薄之處氣少不足使為補瀉也故設當刺井者只瀉其滎以井為木滎為火火者木之子也詳越人此說專為瀉井者言也若當補井則必補其合故引經言補者不可以為瀉瀉者不可以為補各有攸當也補瀉反則病益篤而有實實虛虛之患可不謹哉武按滑氏謂經意為瀉井而補補井補合之言端自瀉南方補北方意也十二經脈流注二十三難曰經脈十二絡脈十五何始何窮也然經脈者行血氣通陰陽以滎於身者也其始從中焦注手太陰陽明陽明注足陽明太陰太陰注手少陰太陽太陽注足太陽少陰少陰注手心主少陽少陽注足少陽厥陰厥陰復還注手太陰別絡十五皆因其原如環無端轉相灌溉朝於寸口人迎以處百病而決死生也滑氏曰因者隨也原者始也朝猶朝會之朝以用也因上文經脈之尺度而推言經絡之行度也直行者謂之經旁出者謂之絡十二經有十二絡兼陽絡陰絡脾之大絡為十五絡也謝氏曰始從中焦者蓋謂飲食入口藏於胃其精微之化注手太陰陽明以次相傳至足厥陰厥陰復還注手太陰也絡脈十五皆隨十二經脈之所始轉相灌溉如環之無端朝寸口人迎以之處百病而決死生也寸口人迎古法以俠喉兩旁動脈為人迎至晉王叔和直以左手關前一分為人迎右手關前一分為氣口後世宗之愚謂昔人所以取人迎氣口者蓋人迎為足陽明胃經受穀氣而養五臟者也氣口為手太陰肺經朝百脈而平權衡者也此事難知云寅手太陰肺始於中焦終於大指內廉出其端卯手陽明大腸始於手大指次指之端終於上俠鼻孔辰足陽明胃始於鼻交頞中終於入大指間出其端已足太陰脾始於足大指之端終於注心中午手少陰心始於心中終於小指之內出其端未手太陽小腸始於小指之端終於抵鼻至目內眥斜絡於顴申足太陽膀胱始於目內眥終於小指內側出其端酉足少陰腎始於小指之下終於注胸中戌手厥陰心包始於胸中終於循小指次指出其端亥手少陽三焦始於小指次指之端終於目銳眥子足少陽膽始於目銳眥終於小指次指內出其端其支者上入大指岐骨內出其端貫爪甲出三毛醜足厥陰肝始於大指聚毛之上終於注肺中十三奇經八脈二十七難曰脈有奇經八脈者不拘於十二經何也然有陽維有陰維有陽蹺有陰蹺有沖有督有任有帶之脈凡此八脈者皆不拘於經故曰奇經八脈也滑氏曰脈有奇常十二經者常脈也奇經八脈則不拘於十二經故曰奇經奇對正而言猶兵家之云奇正也虞氏曰奇者奇零之奇不偶之義謂此八脈不繫於正經陰陽無表裡配合別道奇行故曰奇經也此八脈者督脈督於後任脈任於前衝脈為諸陽之海陰陽維則維絡於身帶脈束之如帶陽蹺得之太陽之別陰蹺本諸少陰之別云經有十二絡有十五凡二十七氣相隨上下何獨不拘於經也然聖人圖設溝渠通利水道以備不然天雨降下溝渠溢滿當此之時霶沛妄作聖人不能復圖也此絡脈滿溢諸經不能拘也滑氏曰經絡之行有常度矣奇經八脈則不能相從也故以聖人圖設溝渠為譬以見絡脈滿溢諸經不能復拘而為此奇經也然則奇經蓋絡脈之滿溢而為之者歟或曰此絡脈三字越人正指奇經而言也既不拘於經直謂之絡脈亦可也此篇兩節舉八脈之名及所以為奇經之義二十八難曰其奇經八脈者既不拘於十二經皆何起何繼也然督脈者起於下極之俞並於脊裡上至風府入屬於腦任脈者起於中極之下以上毛際循腹裡上關元至喉咽衝脈起於氣衝並足陽明之經夾臍上行至胸中而散也帶脈者起於季脅回迥身一周陽蹺脈者起於跟中循外踝上行入風池陰蹺脈者亦起於跟中循內踝上行至咽喉交貫衝脈陽維陰維者維絡於身溢畜不能環流灌溉諸經也故陽維起於諸陽會也陰維起於諸陰交也比於聖人圖設溝渠溝渠滿溢流於深湖故聖人不能拘通也而人脈隆盛入於八脈而不環周故十二經亦不能拘之其受邪氣畜則腫熱砭射之也滑氏曰繼脈經作系督之為言都也為陽脈之海所以都綱乎陽脈也其脈起下極之俞由會陰曆長強循脊中行至大推穴與手足三陽之脈交會上至暗門與陽維會至百會與太陽交會下至鼻柱人中與陽明交會任脈起於中極之下曲骨穴任者妊也為人生養之本衝脈起於氣衝穴至胸中而散為陰脈之海內經作並足少陰之經按衝脈行於幽門通谷而上皆少陰也當從內經此督任沖三脈皆起於會陰蓋一源而分三歧也帶脈起於季脅下一寸八分回身一周猶束帶然陽蹺脈起於足跟中申脈穴循外踝而行陰蹺脈亦起於跟中照海穴循內踝而行蹺捷也以二脈皆起於足故取蹺捷超越之義陽維陰維維絡於身為陰陽之綱維也陽維所發別於金門以陽交為郄與手足太陽及蹺脈會於臑俞與手足少陽會於天窌及會肓井與足少陽會於陽白上本神臨泣正營腦空下至風池與督會於風府瘂門此陽維之起於諸陽會也陰維之郄曰築賓與足太陰會於腹哀大橫又與足太陰厥陰會於府舍期門又與任脈會於天突廉泉此陰維起於諸陰之交也溢畜不能環流灌溉諸經者也十二字當在十二經亦不能拘之之下則於此無所間而於彼得相從矣其受邪氣畜云云十二字謝氏則以為於本文上下當有缺文然脈經無此疑衍文也或云當在三十七難關格不得盡其命而死矣之下因邪在六腑而言也十四十五絡脈二十六難曰經有十二絡有十五餘三絡者是何等絡也然有陽絡有陰絡有脾之大絡陽絡者陽蹺之絡也陰絡者陰蹺之絡也故絡有十五焉滑氏曰直行者謂之經傍行者謂之絡經猶江漢之正流絡則沱潛之支派每經皆有絡十二經有十二絡如手太陰屬肺絡大腸手陽明屬大腸絡肺之類今云絡有十五者以其有陽蹺之絡陰蹺之絡及脾之大絡也陽蹺陰蹺見二十八難謂之絡者蓋奇經既不拘於十二經直謂之絡亦可也脾之大絡名曰大包出淵液三寸布胸脅其動應衣脈宗氣也四明陳氏曰陽蹺之絡統諸陽絡陰蹺之絡能統諸陰絡脾之大絡又總統陰陽諸絡由脾之能溉養五臟也十五奇經病二十九難曰奇經之為病何如然陽維維於陽陰維維於陰陰陽不能自相維則悵然失志溶溶不能自收持陽維為病苦寒熱陰維為病苦心痛陰蹺為病陽緩而陰急陽蹺為病陰緩而陽急沖之為病逆氣而裡急督之為病脊強而厥任之為病其內苦結男子為七疝女子為瘕聚帶之為病腹滿腰溶溶若坐水中此奇經八脈之為病也滑氏曰此言奇經之病也陰不能維於陰則悵然失志陽不能維於陽則溶溶不能自收持陽維行諸陽而主衛衛為氣氣居表故苦寒熱陰維行諸陰而主榮榮為血血屬心故苦心痛兩蹺脈病在陽則陽結急在陰則陰結急受病者急不病者自和緩也衝脈從關元至咽喉故逆氣裡急督脈行背故脊強而厥任脈起胞門行腹故病苦內結男為七疝女為瘕聚也帶脈回身一周故病狀如是溶溶無力貌此各以其經脈所過而言之自二十七難至此義實相因最宜通玩十六十二經以原為俞三焦以俞為原六十六難曰經言肺之原出於太淵心之原出於太陵肝之原出於太衝脾之原出於太白腎之原出於太谿少陰之原出於兌骨神門穴也膽之原出於丘墟胃之原出於衝陽三焦之原出於陽池膀胱之原出於京骨大腸之原出於合谷小腸之原出於腕骨滑氏曰肺之原太淵至腎之原太谿見靈樞第一篇其第二篇曰肺之俞太淵心之俞太陵肝之俞太衝脾之俞太白腎之俞太谿膀胱之俞束骨過於京骨為原膽之俞臨泣過於丘墟為原胃之俞陷谷過於衝陽為原三焦之俞中渚過於陽池為原小腸之俞後谿過於腕骨為原大腸之俞三間過於合谷為原蓋五臟陰經止以俞為原六腑陽經既有俞仍別有原或曰靈樞以太陵為心之原難經亦然而又別以兌骨為少陰之原諸家針灸書並以太陵為手厥陰心主之俞以神門在掌後兌骨之端者為心經所注之俞似此不同者何也按靈樞七十一篇曰少陰無輸心不病乎岐伯曰其外經病而藏不病故獨取其經於掌後兌骨之端也其餘脈出入屈折其行之疾徐皆如手少陰心主之脈行也又第二篇曰心出於中衝溜於勞宮注於太陵行於間使入於曲澤手少陰也按中衝以下並手心主經俞靈樞直指為手少陰而手少陰經俞不別載也又素問繆刺篇曰刺手心主少陰兌骨之端各一痏立已又氣穴篇曰藏俞五十穴王氏注五臟俞惟有心包經井俞之穴而亦無心經井俞穴又七十九難曰假令心病瀉手心主俞補手心主井詳此前後各經文義則知手少陰與心主同治也十二經皆以俞為原者何也然五臟俞者三焦之所行氣之所留止也三焦所行之俞為原者何也然臍下腎間動氣者人之生命也十二經之根本也故名曰原三焦者原氣之別使主通行三氣經歷於五臟六腑原者三焦之尊號也故所止輒為原五臟六腑之有病者皆取其原也滑氏曰十二經皆以俞為原者以十二經之俞皆繫於三焦所行氣所留止之處也三焦所行之俞為原者以臍下腎間動氣乃人之生命十二經之根本三焦則為原氣之別使主通行上中下之三氣經歷於五臟六腑也通行三氣即紀氏所謂下焦稟真元之氣即原氣也上達至於中焦中焦受水穀精悍之氣化為榮衛榮衛之氣與真元之氣通行達於上焦也所以原為三焦之尊號而所止輒為原猶警蹕所至稱行在所也五臟六腑之有病者皆於是而取之宜哉拔萃云本經原穴無經絡逆從子母補瀉凡刺原穴診見動作來應而內針吸則得氣無令出針停而久留氣盡乃出此拔原之法王海藏曰假令針肝經病了於本經原穴亦針一針如補肝經來亦於本經原穴補一針如瀉肝經來亦於本經原穴瀉一針如余經有補瀉畢仿此例亦補瀉各經原穴凡此十二原非瀉子補母之法虛實通用故五臟六腑有病皆取其原六十七難曰五臟募皆在陰而俞在陽何謂也然陰病行陽陽病行陰故令募在陰俞在陽滑氏曰募與俞五臟空穴之總名也在腹為陰則謂之募在背為陽則為之俞募猶募結之募言經氣之聚於此也俞史記扁鵲傳作輸猶委輸之輸言經氣由此而輸於彼也五臟募在腹肺之募中府二穴在胸部雲門下一寸乳上三肋間動脈陷中心之募巨關一穴在鳩尾下一寸脾之募章門二穴在季脅下直臍肝之募期門二穴在不容兩旁各一寸五分腎之募京門二穴在腰中季脅本五臟俞在背行足太陽之經肺俞在第三椎下心俞在五椎下肝俞在九椎下脾俞在十一椎下腎俞在十四椎下皆俠脊兩旁各一寸五分陰病行陽陽病行陰者陰陽經絡氣相交貫臟腑腹背氣相通應所以陰病有時而行陽陽病有時而行陰也針法曰從陽引陰從陰引陽按經言行陽行陰是必然者而滑注則言有時似或然也似非經旨也十七八會刺穴四十五難曰經言八會者何謂也然腑會太倉臟會季脅筋會陽陵泉髓會絕骨血會鬲俞骨會大杼脈會太淵氣會三焦外一筋直兩乳內也熱病在內者取其會之氣穴也滑氏曰太倉一名中脘在臍上四寸六腑取稟於胃故為腑會季脅章門穴也在大橫外直臍季肋端為脾之募五臟取稟於脾故為臟會足少陽之筋結於膝外廉陽陵泉也在膝下一寸外廉陷中又膽與肝為配肝者筋之合故為筋會絕骨一名陽輔在足外踝上四寸輔骨前絕骨端如前三分諸髓皆屬於骨故為髓會鬲俞在背第七椎下去脊兩旁各一寸半足太陽脈氣所發也太陽多血又血乃水之象故為血會大杼在項後第一椎下去脊兩旁各一寸太淵在掌後陷中動脈即所謂寸口者脈之大會也氣會三焦外一筋直兩乳內即膻中為氣海者也在玉堂下一寸六分熱病在內者各視其所屬而取之會也謝氏曰三焦當作上焦四明陳氏曰髓會絕骨髓屬於腎腎主骨於足少陽無所關腦為髓海腦有枕骨穴則當會枕骨絕骨誤也血會鬲俞血者心所統肝所藏鬲俞在七椎下兩旁上則心俞下則肝俞故為血會骨會大杼骨者髓所養髓自腦下注於大杼大杼滲入脊心下貫尾骶滲諸骨節故骨節之氣皆會於此亦通古益袁氏曰人能健步以髓會絕骨也肩能任重以骨會大杼也十八上工下工治病七十七難曰經言上工治未病中工治已病何謂也然所謂治未病者見肝之病則知肝當傳之於脾故先實其脾氣無令得受肝之邪故曰治未病焉中工治已病者見肝之病不曉相傳但一心治肝故曰治已病也滑氏曰見肝之病先實其脾使邪無所入治未病也是為上工見肝之病一心治肝治已病也是為中工靈樞五十五篇曰上工刺其未生也其次刺未盛者也其次刺已衰者也下工刺其方襲者也與其形之盛者也與其病之與脈相逆者也故曰方其盛也勿敢必毀傷因其衰也事乃大昌故曰上工治未病不治已病此之謂也
