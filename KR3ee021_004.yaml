body:
  text: 卷三一十二經病刺手太陰是動則病肺脹滿膨膨而喘咳缺盆中痛甚則交兩手而瞀此為臂厥是主肺所生病者咳上氣喘渴煩心胸滿臑臂內前廉痛厥掌中熱氣盛有餘則肩背痛風寒汗出中風小便數而欠氣虛則肩背痛寒少氣不足以息溺色變盛者寸口大三倍於人迎虛者寸口反小於人迎也手陽明是動則病齒痛頸腫是主津液所生病者目黃口乾鼽衄喉痹肩前臑痛大指次指痛不用氣有餘則當脈所過者熱腫虛則寒慄不復盛者人迎大三倍於寸口虛者人迎反小於寸口也足陽明是動則病洒洒振寒善呻數欠顏黑病至則惡人與火聞木聲則惕然而驚心欲動獨閉戶塞牖而處甚則欲上高而歌棄衣而走賁響腹脹是為骭厥是主血所生病者狂瘧溫淫汗出鼽衄口喎唇胗頸腫喉痹大腹水腫膝臏腫痛循膺乳氣街股伏菟骭外廉足跗上皆痛中指不用氣盛則身已前皆熱其有餘於胃則消穀善飢溺色黃氣不足則身已前皆寒慄胃中寒則脹滿盛者人迎大三倍於寸口虛者人迎反小於寸口也足太陰晃動則病舌本強食則嘔胃脘痛腹脹善噫得後與氣則快然如衰身體皆重是主脾所生病者舌本痛體不能動搖食不下煩心心下急痛溏瘕泄水閉黃疸不能臥強立股膝內腫厥足大趾不用盛者寸口大三倍於人迎虛者寸口反小於人迎也手少陰是動則病嗌乾心痛渴而欲飲是為臂厥是主心所生病者目黃脅痛臑臂內後廉痛厥常中熱痛盛者寸口大再倍於人迎虛者寸口反小於人迎也手太陽是動則病嗌痛頷腫不可以顧肩似拔臑似折是主液所生病者耳聾目黃頰腫頸頷肩臑肘臂外後廉痛盛者人迎大再倍於寸口虛者人迎反小於寸口也足太陽是動則病沖頭痛目似脫項如拔脊痛腰似折膕如結踹如裂是為踝厥是主筋所生病者痔瘧狂癲疾頭囟項痛目黃溺出鼽衄項腰尻膕踹腳皆痛小指不用盛者人迎大再倍於寸口虛者人迎反小於寸口也足少陰是動則病飢不欲食面如炭色咳唾則有血喝喝而喘坐而欲起日䀮䀮如無所見心如懸若飢狀氣不足則善恐心惕惕如人將捕之是為骨厥是主腎所生病者口熱舌乾咽腫上氣嗌乾及痛煩心心痛黃疸腸澼脊股內後廉痛痿厥嗜臥足下熱而痛盛者寸口大再倍於人迎虛者寸口反小於人迎也手厥陰是動則病手心熱臂肘攣急腋腫甚則胸脅支滿心中澹澹大動面赤目黃喜笑不休是主脈所生病者煩心心痛掌中熱盛者寸口大一倍於人迎虛者寸口反小於人迎也手少陽是動則病耳聾渾渾焞焞嗌腫喉痹是主氣所生病者汗出目銳眥痛耳後肩臑肘臂外皆痛小指次指不用盛者人迎大一倍於寸口虛者人迎反小於寸口也足少陽是動則病口苦善太息心脅痛不能轉側甚則面微有塵體無膏澤足外反熱是為陽厥是主骨所生病者頭角頷痛目銳眥痛缺盆中腫痛腋下腫馬刀俠癭汗出振寒瘧胸脅肋髀膝外至脛絕骨外踝前及諸節皆痛小指次指不用盛者人迎大一倍於寸口虛者人迎反小於寸口也足厥陰是動則病腰痛不可以俯仰丈夫㿉疝婦人小腹腫甚則嗌乾面塵脫色是主肝所生病者胸滿嘔逆飧泄狐疝遺溺閉癃盛者寸口大一倍於人迎虛者寸口反小於人迎也此十二經病盛則瀉之虛則瀉之熱則疾之寒則留之陷下則灸之不盛不虛以經取之二奇經八脈病督脈此生病從小腹上衝心而痛不得前後為沖疝其女子不孕癃痔遺溺嗌乾脊強反折督脈生病治督脈任脈為病男子內結七疝女子帶下瘕聚陽蹺脈為病陰緩而陽急氣並相還則為濡目氣不榮則目不合陰蹺脈為病令人陽緩而陰急衝脈為病令人逆氣裡急陽維脈若不能維於陽則溶溶不能自收持陰維脈若不能維於陰則棖然失志帶脈為病腰腹縱容如囊水之狀三十二經脈帝曰經脈者所以決死生處百病不可不通肺手太陰之脈起於中焦下絡大腸還循胃口上鬲屬肺從肺系橫出腋下下循臑內行少陰心主之前下肘中循臂內上骨下廉入寸口上魚循魚際出大指之端其支者從腕後直出次指內廉出其端大腸手陽明之脈起於大指次指之端循指上廉出合谷兩骨之間上入兩筋之中循臂上廉入肘外廉上循臑外前廉上肩出髃骨之前廉出於柱骨之會上下之缺盆絡肺下鬲屬大腸其支者從缺盆上頸貫頰入下齒中還出挾口交人中左之右右之左上挾鼻孔胃足陽明之脈起於鼻之交頞中旁納一作本幼太陽之脈下循鼻外入上齒中還出俠口環唇下承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下鬲屬胃絡脾其直行者從缺盆下乳內廉下挾臍入氣街中其支者起於胃口下循腹裡下至氣街中而合以下髀關抵伏兔下膝臏中下循胻外廉下足跗入中趾外間其支者下廉三寸而別下入中趾外間其支者下廉三寸而別下入中趾外間其支者別跗上入大趾間出其端脾足太陰之脈起於大指之端循指內側白肉際過核骨後上內踝前廉上踹內循胻骨後交出厥陰之前上膝股內前廉入腹屬脾絡胃上鬲挾咽連舌本散舌下其支者復從胃別上鬲注心中心手少陰之脈起於心中出屬心系下鬲絡小腸其支者從心系上挾咽系目系其直者復從心系卻上肺下出腋下下循臑內後廉行太陰心主之後下肘骨循臂內後廉抵掌後兌骨之端入掌內後廉循小指之內出其端小腸手太陽之脈起於小指之端循手外側上出踝中直上循臂骨下廉出肘內側兩筋之間上循臑外後廉出肩解繞肩胛交肩上入缺盆絡心循咽下鬲抵胃屬小腸其支者從缺盆循頸上頰至目銳眥卻入耳中其支者別頰上䪼抵鼻至目內眥斜絡於顴膀胱足太陽之脈起於目內眥上額交巔其支者從巔至耳上角其直者從巔入絡腦還出別下項循肩膊內挾脊抵腰中入循膂絡腎屬膀胱其支者從要中下夾脊貫臀入膕中其支者從膊內左右別下貫胛挾脊內過髀樞循髀外從後廉下合膕中以下貫踹內出外踝之後循京骨至小趾外側腎足少陰之脈起於小趾之下斜走足心出於然谷之下循內踝之後別入跟中以上踹內出膕內廉上股內後廉貫脊屬腎絡膀胱其直者從腎上貫肝鬲入肺中循喉嚨夾舌本其支者從肺出絡心注胸中心主手厥陰心包絡之脈起於胸中出屬心包絡下鬲歷絡三焦其支者循胸中出脅下腋三寸上抵腋下循臑內行太陰少陰之間入肘中下臂行兩筋之間入掌中循中指出其端其支者別掌中循小指次指出其端三焦手少陽之脈起於小指次指之端上出兩指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩而交出足少陽之後入缺盆布膻中散絡心包下鬲循屬三焦其支者從膻中上出缺盆上項系耳後直上出耳上角以屈下頰至䪼其支者從耳後入耳中出走耳前過客主人前交頰至目銳眥膽足少陽之脈起於目銳眥上抵頭角下耳後循頸行手少陽之前至肩上交出手少陽之後入缺盆其支者後耳後入耳中出走耳前至目銳眥後其支者別銳眥下大迎合於手少陽抵於䪼下加頰車下頸合缺盆以下胸中貫鬲絡肝屬膽循脅裡出氣街繞毛際橫入髀厭中其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀陽出膝外廉下外輔骨之前直下抵絕骨之端下出外踝之前循足跗上入小趾次趾之間其支者別跗上入大趾之間循大趾岐骨內出其端還貫爪甲出三毛肝足厥陰之脈起於大趾聚毛之際上循足跗上廉去內踝一寸上踝八寸交出太陰之後上膕內廉循股陰入毛中過陰器抵小腹挾胃屬肝絡膽上貫鬲布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會於巔其支者從目系下頰裡環唇內其支者復從肝別貫鬲上注肺四奇經八脈督脈者起於小腹以下骨中央女子入系廷孔其孔溺孔之端也其絡循陰器合篡間繞篡後繞臀至少陰與巨陽中絡者合少陰上股內後廉貫脊屬腎與太陽起於目內眥上額交巔上入絡腦還出別下項循肩慄內俠脊抵腰中入循膂絡腎其男子循莖下至篡與女子等其小腹直上者貫臍中央上貫心入喉上頤環唇上系兩目之下中央督脈起於下極之俞並於脊裡上至風府入腦上巔循額至鼻柱屬陽脈之海也任脈與衝脈皆起於胞中循脊裡為經絡之海其浮而外者循腹右上行會於咽喉別而絡唇口血氣盛則肌肉熱血獨盛則滲灌皮膚生毫毛婦人有餘於氣不足於血以其月事數下任沖並傷故也任沖之交脈不榮於唇口故髭鬚不生任脈者起於中極之下以上毛際循腹裡上關元至喉嚨屬陰脈之海也衝脈與任脈皆起胞中上循脊裡為經絡之海其浮於外者循腹上行會於咽喉別而絡唇口又衝脈起於氣衝並足少陰之經挾臍上行會於咽喉至胸而散陽蹺脈起於跟中循外踝上行入風池兩足蹺脈本太陽之別何於太陽男子數其陽女子數其陰當數者為經不當數者為絡也陰蹺脈起於跟中循內踝上行至喉嚨交貫衝脈蹺脈少陰之別起於然骨之後上內跟之上直上循陰股入陰上循胸裡入缺盆上出人迎之前入頄屬目內眥合於太陽男子以之為經女子以之為絡陰蹺之郄在交信陽維脈維於陽起於諸陽之會與陰維皆維絡於身其脈氣所發別於金門以陽交為郄與手足太陽及蹺脈會於臑俞與手足少陽會於天髎又會於肩井其在頭也又與足少陽會於陽白上於本神及臨泣上至正營循於腦空下至風池其與督脈會則在風腑及瘂門陰維脈維於陰其脈起於諸陰之交陰維之郄名曰築賓與足太陰會於腹哀大橫又與足太陰厥陰會於府舍期門又與任脈會於天突廉泉帶脈者起於季脅圍身一周其脈氣所發在季脅下一寸八分正名帶脈以其圍身一周如帶也又與足陽會於維道五十五絡脈手太陰之別名曰列缺起於腕上分間並太陰之經直入掌中散入於魚際其病實則手銳掌熱虛則欠劫小便遺數取之去腕半寸別走陽明也手少陽陰之別名曰通里去腕一寸半別而上行循經入於心中系舌本屬目系實則支鬲虛則不能言取之掌後一寸別走太陽也手心主之別名曰內關去腕二寸出於兩筋之間循經心上系於心包絡心系實則心痛虛則頭強取之兩筋間也手太陽之別名曰支正上腕五寸內注少陰其別者上走肘絡肩髃實則節弛肘廢虛則生肬小者如指痂疥取之所別也手陽明之絡名曰偏歷去腕三寸別入太陰其別者上循臂乘肩髃上曲頰偏齒其別者入耳合於宗脈實則齲聾虛則齒寒痹隔取之所別也手少別名曰外關去腕二寸外繞臂注胸中合心主病實則肘攣虛則不收取之所別也足太陽之別名曰飛揚去踝七寸別走少陰實則鼽窒頭背痛虛則鼽衄取之所別也足少陽之別名曰光明去踝五寸別走厥陰下絡足跗實則厥虛則痿蹶坐不能起取之所別也足陽明之別名曰豐隆去踝八寸別走太陰其別者循脛骨外廉上絡頭項合諸經之氣下絡喉咽其病氣逆則喉痹瘁喑實則狂癲虛則足不收脛枯取之所別也足太陰之別名曰公孫去本節之後一寸別走陽明其別者入絡腸胃厥氣上逆則霍亂實則腸中切痛虛則鼓脹取之所別也足少陰之別名曰大鐘當踝後繞跟別走太陽其別者並經上走於心包下外貫腰脊其病氣逆則煩悶實則閉癃虛則腰痛取之所別也足厥陰之別名曰蠡溝去內踝五寸別走少陽其別者徑脛上睪結於莖其病氣逆則睪腫卒疝實則挺長虛則暴癢取之所別也任脈之別名曰尾翳下鳩尾散於腹寮則腹皮痛虛則癢瘙取之所別也督脈之別名曰長強挾膂上項散頭上下當肩胛左右別走太陽入貫膂實則脊強虛則頭重高搖之夾脊之有過者取之所別也脾之大絡名曰大包出淵液下三寸布胸脅實則身盡痛虛則百節盡皆縱此脈若羅絡之血者皆取之脾大絡也凡此十五絡者實則必見虛則必下視之不見求之上下人經不同絡脈異所別也六十二經筋足太陽之筋起於足小趾上結於踝斜上結於膝其下循足外踝結於踵上循跟結於膕其別者結於臑外上膕中內廉與膕中並上結於臀上挾脊上項其支者別入結於舌本其直者結於枕骨上頭下顏結於鼻其支者為目上綱下結於頄其支者從腋後外廉結於肩髃其支者入腋下上出缺盆上結於完骨其支者出缺盆斜上出於頄其病小趾支跟踵痛膕脊反折項筋急肩不舉腋支缺盆紐痛不可左右搖治在燔針動刺以之為數以痛為輸足少陽之筋起於小趾次趾上結外踝上循脛外廉結於膝外廉其支者別起外輔骨上走髀前者結於伏菟之上後者結於尻直者上乘䏚季脅上走腋前廉繫於膺乳結於缺盆直者上出腋貫缺盆出太陽之前循耳後上額角交巔上下走頷上結於頄支者結於目眥為外維其病小指次指支轉筋引膝外轉筋膝不可屈伸膕筋急前引髀後引尻即上乘䏚季脅痛上引缺盆膺乳頸維筋急從左之右右目不開上過右角並蹺脈而行左絡於右故傷左角右足不用命曰維筋相交治在燔針劫刺以知為數以痛為輸足陽明之筋起於中三趾結於跗上斜外上加於轉骨上結於膝外廉直上結於髀樞上循脅屬脊其直者上循骭結於膝其支者結於外轉骨合少陽其直者上循伏菟上結於髀聚於陰器上腹而布至缺盆而結上頸上挾口合於頄下結於鼻上合於太陽太陽為目上綱陽明為目下綱其支者從頰結於耳前其病足中趾支脛轉筋腳跳堅伏菟轉筋髀前腫㿉疝腹筋急引缺盆及頰卒口僻急者目不合熱則筋縱目不開頰筋有寒則急引頰移口有熱則筋馳縱緩不勝收故僻治之以馬膏膏其急者以白酒和桂以塗緩其以桑鉤鉤之即以生桑灰置之坎中高下以坐等以膏熨急頰且飲美酒啖美炙肉不飲酒者自強也為之三拊而已治在燔針劫刺以知為數以痛為輸足太陰之筋起於大趾之端內側上結於內踝其直者絡於膝內輔骨上循陰股結於髀聚於陰器上腹結於臍循腹裡絕於肋散於胸中其內者著於脊其病足大趾支內踝轉筋痛膝內轉骨痛陰股引髀而痛陰器紐痛下引臍兩脅痛引膺中脊內痛治在燔針劫刺以知為數以痛為輸足少陰之筋起於小趾之下並足太陰之筋斜走內踝之下結於踵與太陽之筋合而上結於內輔之下並太陰之筋而上循陰股結於陰器循脊內挾膂上至項結於枕骨與足太陽之筋合其病足下轉筋及所過而結者皆痛及轉筋病在此者主癇瘈及痙在外者不能俯在內者不能仰故陽病者腰反折不能俯陰病者不能仰治在燔針劫刺以知為數以痛為輸足厥陰之筋起於大趾之上上結於內踝之前上循脛上結內轉之下上循陰股結於陰器絡諸筋其病足大趾支內踝之前痛內轉痛陰股痛轉筋陰器不用傷於內則不起傷於寒則陰縮入傷於熱則縱挺不收治在行水清陰氣其病轉筋者治在燔針劫刺以知為數以痛為輸手太陽之筋起於小指之上結於腕上循臂內廉結於肘內銳者之後彈之應小指之上入結於腋下其支者後走腋後廉上繞肩胛循頸出走太陽之前結於耳後完骨其支者入耳中直者出耳上下結於頷上屬目外眥其病小指支肘內銳骨後廉痛循臂陰入腋下腋下痛腋後廉痛繞肩胛引頸痛應耳中鳴痛引頷目瞑良久乃得視頸筋急則為筋痿頸腫寒熱在頸上者治在燔針劫刺以知為數以痛為輸其為腫者復而銳之本支者上抽牙循耳前屬目外眥上頷結於角其痛當所過者支轉筋治在燔針劫刺以知為數以痛為輸手少陽之筋起於小指次指之端結於腕上循臂結於肘上繞臑外廉上肩走頸合手太陽其支者當曲頰入系舌本其支者上曲牙循耳前屬目外眥上乘頷結於角其病當所過者即支轉筋舌卷治在燔針劫刺以知為數以痛為輸手陽明之筋起於大指次指之端結於腕上循臂上結於肘外上臑結於髃其支者繞肩胛挾脊直者從肩髃上頸其支者上頰結於頄直者上出手太陽之前上左角絡頭下右頷其病當所過者支痛及轉筋肩不舉頸不可左右視治在燔針劫刺以知為數以痛為輸手太陽之筋起於大指之上循指上行結於魚後行寸口外側上循臂結肘中上臑內廉入腋下出缺盆結肩前髃上結缺盆下結胸裡散貫賁下抵季脅其病當所過者支轉筋痛甚成息賁脅急吐血治地燔針劫刺以知為數以痛為輸手心主之筋起於中指與太陰之筋並行結於肘內廉上臂陰結腋下下散前後挾脅其支者入腋散胸中結於臂其病當所過者支轉筋前及胸痛息賁治在燔針劫刺以知為數以痛為輸手少陰之筋起於小指之內側結於銳骨上結肘內廉上入腋交太陰挾乳里結於胸中循臂下繫於臍其病內急心痛伏梁下為肘綱其病當所過者支轉筋筋痛治在燔針劫刺以知為數以痛為輸其成伏梁唾膿血者死不治經筋之病寒則反折筋急熱則筋馳縱不收陰痿不用陽急則反折陰急則俯不伸淬刺者刺寒急也熱則筋緩不收無用燔針足之陽明手之太陽筋急則口目為噼眥急不能卒視治皆如上方也七空穴臟俞五十穴腑腧七十二穴熱俞五十九穴水俞五十七頭上五行行五五五二十五穴中𦛗兩旁各五凡十穴大椎上兩旁各一凡二穴目瞳子浮白二穴兩髀厭中二穴犢鼻二穴耳中多所聞二穴眉本二穴完骨二穴項中央一穴枕骨二穴上關二穴大迎二穴下關二穴天柱二穴巨虛上下廉四穴曲牙二穴天突一穴天府二穴天牖二穴扶突二穴天窗二穴肩解二穴關元一穴委陽二穴肩貞二穴喑門一穴臍一穴胸俞十二穴背俞二穴膺俞十二穴分肉二穴踝上橫二穴陰陽蹺四穴水俞在諸分熱俞在氣分寒俞在兩骸厭中二穴大禁二十五在天府下五寸凡三百六十五穴針之所由行也足太陽脈氣所發者七十八裕兩眉頭各一入髮際至頂三寸半旁五相去三寸其浮氣在皮中者凡五行行五五五二十五項中大筋兩旁各一風府兩旁各一俠背以下至尻尾二十一節十五間各一五臟之俞各五六府之俞各六委中以下至足小趾旁各六俞足少陽脈氣所發者凡六十二穴兩角上各二直目上髮際內各五耳前角上各一耳前角下各一銳發下各一客主人各一耳後陷中各一下關各一耳下牙車之後各一缺盆各一掖下三寸脅下至胠八間各一髀樞中各一膝以下至小趾次趾各六俞足陽明脈氣所發凡六十八穴額顱髮際旁各三面鼽骨空各一大迎之骨空各一人迎各一缺盆外骨空各一膺中骨間各一俠鳩尾之外當乳下三寸俠胃脘各五俠臍廣三寸各三下臍二寸俠之各三氣衝動脈各一伏菟上各一三里以下至足中趾各八俞分之所在穴空手太陽之脈氣所發者三十六穴目內眥各一目外眥各一鼽骨下各一耳郭上各一耳中各一巨骨穴各一曲腋上骨穴各一柱骨上陷者各一上天窗四寸各一肩解各一肩解下三寸各一肘以下至手小指本各六俞手陽明脈氣所發者二十二穴鼻空外廉項上各二大迎骨空各一桂骨之會各一髃骨之會各一肘以下至手大指次指本各六俞手少陽脈氣所發三十二鼽骨下各一眉後各一角上各一下完骨後各一項中足太陽之前各一挾扶突各一肩貞各一肩貞下三寸分間各一肘以下至手小指次指指本名六俞督脈氣所發者二十八穴項中央二髮際後中八面中三大椎以下至尻尾及傍十五穴至骶下凡二十一節脊椎法也任脈之氣所發者二十八穴喉中央二膺中骨陷中各一鳩尾下三寸胃脘五寸胃脘以下至橫骨六寸半一腹脈法也下陰別一目下各一下唇一齦交一衛脈氣所發者二十二穴俠鳩尾外各半寸至齊寸一俠齊下旁各五分至橫骨寸一腹脈法也足少陰舌下厥陰毛中急脈各一手少陰各一陰陽蹺各一手足諸魚際脈氣所發者凡三百六十五穴也水俞五十七穴尻上五行行五伏菟上兩行五左右各一行行五踝上各一行行六穴八十二經井滎俞原經合帝曰凡刺之道必通十二經絡之所終始絡脈之所別處五俞之所留六腑之所與合四時之所出入五臟之所溜處闊數之度淺深之狀高下所至願聞其解岐伯曰請言其次也肺出於少商少商者手大指端內側也為井木溜於魚際魚際者手魚也為滎注於太淵太淵魚後一寸陷者中也為俞行於經渠經渠寸口中也動而不居為經入於尺澤尺澤肘中之動脈也為合手太陰經也心出於中衝中衝手中指之端也為井木溜於勞宮勞宮掌中中指本節之間也為滎注於大陵大陵掌後兩骨之間方下者也為俞行於間使間使之道兩筋之間三寸中也有過則至無過則止為經入於曲澤曲澤肘內廉下陷者之中也屈而得之為合手少陰也肝出於大敦大敦者足大趾之端及三毛之中也為井水溜於行間行間者足大趾間也為滎注於太衝太衝行間上二寸陷者之中也為俞行於中封中封內踝之前一寸半陷者之中使逆則宛使和則通搖足而得之為經入於曲泉曲泉輔骨之下太筋之上也屈膝而得之為合足厥陰也脾出於隱白隱白者足大趾之端內側也為井木溜於大都大都本節之後下陷者之中也為滎注於太白太白腕骨之端也為俞行商丘商丘內踝之下陷者之中也為經入於陰之陵泉陰之陵泉輔骨之下陷者之中也伸而得之為合足太陰也腎出於湧泉湧泉者足心也為井木溜於然谷然谷然骨之下者也為滎注於太谿太谿內踝之後跟骨之上陷中者也為俞行於復溜復溜上內踝二寸動而不休為經入於陰谷陰谷轉骨之後大筋之下小筋之上也按之應手屈膝而得之為合足少陰之經也膀胱出於至陰至陰者足小趾之端也為井金溜於通谷通谷本節之前外側也為滎注於束骨束骨本節之後陷者中也為俞過於京骨京骨足外側大骨之下為原行於崑崙崑崙在外踝之後跟骨之上為經入於委中委中膕中央為合委而取之足太陽也膽出於竅陰竅陰者足小趾次趾之端也為井金溜於俠谿俠谿足小趾次趾之間也為滎注於臨泣臨泣上行一寸半陷者中也為俞過於丘墟丘墟外踝之前下陷中也為原行於陽輔陽輔外踝之上輔骨之前及絕骨之端也為經入於陽之陵泉陽之陵泉在膝外陷者中為合伸而得之足少陽也胃出於厲兌厲兌者足大趾內次趾之端也為井金溜於內廷內廷次趾外間也為滎注於陷谷陷谷者上中趾內間上行二寸陷者中也為俞過於衝陽衝陽足跗上五寸陷者中也為原搖足而得之行於解谿解谿上衝陽一寸半陷者中也為經入於下陵下陵膝下三寸䯒骨外三里也為合復下三里三寸為巨虛上廉復下上廉三寸為巨虛下廉也大腸屬上小腸屬下足陽明胃脈也大腸小腸皆屬於胃是足陽明也三焦者上合手少陽出於關衝關衝者手小指次指之端也為井金溜於液門液門小指次指之間也為滎注於中渚中渚本節之後陷中者也為俞過於陽池陽池在腕上陷者之中也為原行於支溝支溝上腕三寸兩骨之間陷者中也為經入於天井天井在肘外大骨之上陷者中也為合屈肘乃得之手太陽小腸者上合於太陽出於少澤少澤小指之端也為井金溜於前谷前谷在手外廉本節前陷者中也為滎注於後溪後谿者在手外側本節之後也為俞過於腕骨腕骨在手外側腕骨之前為原行於陽谷陽谷在銳骨之下陷者中也為經入於小海小海在肘內大骨之外去端半寸陷者中也伸臂而得之為合手太陽經也大腸上合手陽明出於商陽商陽大指次指之端也為井金溜於本節之前二間為滎注於本節之後三間為俞過於合谷合谷在大指歧骨之間為原行於陽谿陽谿在兩筋間陷中者也為原入於曲池在肘外轉骨陷者中屈臂而得之為合手陽明也是謂五臟六腑之俞五五二十五俞六六三十六俞也九同身尺寸頭之大骨圍二尺六寸胸圍四尺五寸腰圍四尺二寸發所覆者顱至項尺二寸發以下至頤長一尺結喉以下至缺盆中長四寸缺盆以下至𩩲𩨗長九寸過則肺大不滿則肺小𩩲𩨗以下至天樞長八寸過則胃大不及則胃小天樞以下至橫骨長六寸半過則迴腸廣長不滿則狹短橫骨長六寸半橫骨上廉以下至內輔之上廉長一尺八寸內輔之上廉以下至下廉長三寸半內輔下廉下至內踝長一尺三寸內踝以下至地長三寸膝膕以下至跗屬長一尺六寸跗屬以下至地長三寸故骨圍大則太過小則不及角以下至柱骨長一尺行腋中不見者長四寸腋以下至季脅長一尺二寸季脅以下至髀樞長六寸髀樞以下至膝中長一尺九寸膝以下至外踝長一尺六寸外踝以下至京骨長三寸京骨以下至地長一寸耳後當完骨者廣九寸耳前當耳門者廣一尺三寸兩顴之間相去七寸兩乳之間廣九寸半兩髀之間廣六寸半足長一尺二寸廣四寸半肩至肘長一尺七寸肘至腕長一尺一寸半腕至中指本節長四寸本節至其未長四寸半項發以下至背骨長二寸半膂骨以下至尾骶二十一節長三尺上節長一寸四分分之一奇分在下故上七節至於膂骨九寸八分分之七此眾人骨之度也十經脈長短手之六陽從手至頭長五尺五六三丈手之六陰從手至胸中三尺五寸三六一丈八尺五六三尺合二丈一尺足之六陽從足上至頭八尺六八四丈八尺足之六陰從足至胸中六尺五寸六六三丈六尺五六三尺合三丈九尺蹺脈從足至目七尺五寸二七一丈四尺二五一尺合一丈五尺督脈任脈四尺五寸二四八尺二五一尺合九尺凡都合十六丈二尺此氣之大經隧也
